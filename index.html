<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;overflow:hidden}
body{background:#0f1117;color:#e8eaf0}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,select{font-family:inherit;outline:none;border:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#2a3349;border-radius:3px}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;height:100dvh;position:relative}
#sidebar{width:220px;min-width:220px;background:#13181f;border-right:1px solid #252d3e;display:flex;flex-direction:column;padding:16px 10px;overflow:hidden;transition:transform .25s ease;z-index:200;flex-shrink:0}
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
#header{padding:16px 16px 0;display:flex;align-items:flex-start;gap:10px}
#header-text{flex:1;min-width:0}
#content{padding:12px 16px 32px;flex:1}

/* ── AUTH SCREEN ── */
#auth-root{
  display:none;
  width:100%;height:100vh;height:100dvh;
  background:#0f1117;
  align-items:center;justify-content:center;
  padding:16px;
}
.auth-form{
  background:#1a2030;border:1px solid #252d3e;border-radius:16px;
  padding:32px 28px;width:100%;max-width:380px;
}
.auth-logo{display:flex;justify-content:center;margin-bottom:16px}
.auth-title{font-size:20px;font-weight:700;color:#e8eaf0;text-align:center;margin-bottom:6px}
.auth-sub{font-size:13px;color:#7a869a;text-align:center;margin-bottom:22px}
.auth-btn{
  width:100%;padding:11px;border-radius:10px;font-weight:700;
  font-size:15px;color:#fff;border:none;cursor:pointer;margin-top:4px;
  transition:opacity .15s;
}
.auth-btn:disabled{opacity:.6;cursor:not-allowed}
.auth-btn:hover:not(:disabled){opacity:.9}
.auth-btn-ghost{
  width:100%;padding:10px;border-radius:10px;font-weight:600;
  font-size:14px;color:#e8eaf0;border:1px solid #252d3e;
  background:#20293a;cursor:pointer;margin-top:6px;
}
.auth-btn-ghost:hover{background:#252d3e}
.auth-error{
  background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);
  color:#ef4444;border-radius:8px;padding:10px 12px;
  font-size:13px;margin-bottom:14px;
}
.auth-success{
  background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);
  color:#10b981;border-radius:8px;padding:10px 12px;
  font-size:13px;margin-bottom:14px;
}
.auth-divider{
  text-align:center;font-size:12px;color:#7a869a;
  margin:14px 0 4px;position:relative;
}
.auth-divider::before,.auth-divider::after{
  content:'';position:absolute;top:50%;width:35%;height:1px;background:#252d3e;
}
.auth-divider::before{left:0}.auth-divider::after{right:0}
.auth-links{text-align:right;margin-top:8px}

/* ── USER BADGE (header) ── */
#user-badge{
  display:flex;align-items:center;gap:8px;padding:6px 10px;
  border-radius:8px;background:#20293a;border:1px solid #252d3e;
  cursor:pointer;font-size:12px;color:#7a869a;flex-shrink:0;
  position:relative;
}
#user-badge:hover{background:#252d3e}
#user-menu{
  display:none;position:absolute;top:calc(100% + 6px);right:0;
  background:#1a2030;border:1px solid #252d3e;border-radius:10px;
  padding:8px;min-width:180px;z-index:500;box-shadow:0 8px 24px rgba(0,0,0,.4);
}
#user-menu.open{display:block}
.user-menu-item{
  padding:9px 12px;border-radius:7px;font-size:13px;color:#e8eaf0;
  cursor:pointer;display:flex;align-items:center;gap:8px;
}
.user-menu-item:hover{background:#252d3e}
.user-menu-item.danger{color:#ef4444}

/* ── HAMBURGER ── */
#hamburger{display:none;flex-direction:column;justify-content:center;align-items:center;width:36px;height:36px;border-radius:8px;background:#1a2030;border:1px solid #252d3e;gap:5px;flex-shrink:0;margin-top:3px;cursor:pointer}
#hamburger span{display:block;width:18px;height:2px;background:#e8eaf0;border-radius:2px;transition:all .2s}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199}

/* ── SIDEBAR ── */
.logo{display:flex;align-items:center;gap:10px;padding:8px 10px;margin-bottom:14px}
.logo-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-weight:700;font-size:18px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:14px;margin-bottom:2px;user-select:none;transition:background .15s}
.nav-item .ni{font-size:16px;flex-shrink:0}
.sidebar-bottom{margin-top:auto}
.regle-widget{border-radius:8px;padding:10px;border:1px solid #252d3e;margin-top:10px;background:#0f1117}
.regle-widget .rw-title{font-size:11px;font-weight:700;color:#7a869a;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.regle-row{display:flex;justify-content:space-between;font-size:12px;color:#7a869a;margin-bottom:2px}
.regle-row b{color:#e8eaf0}

/* ── CARDS ── */
.card{background:#1a2030;border:1px solid #252d3e;border-radius:12px;padding:16px 18px}
.card-title{font-weight:700;font-size:15px;color:#e8eaf0;margin-bottom:14px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi{border-radius:12px;padding:14px 16px}
.kpi-label{font-size:12px;color:#7a869a;margin-bottom:4px}
.kpi-val{font-size:19px;font-weight:700}
.kpi-sub{font-size:11px;margin-top:2px;color:rgba(255,255,255,.5)}
.grid-2{display:grid;gap:12px;margin-bottom:12px}
.grid-2-pie{grid-template-columns:1fr 230px}
.grid-2-hist{grid-template-columns:1fr 260px}
.pbar-wrap{height:8px;border-radius:4px;background:#252d3e;overflow:hidden}
.pbar-fill{height:100%;border-radius:4px;transition:width .4s}
.pbar-rest{font-size:12px;color:#7a869a;margin-top:4px;background:#161d2d;border-radius:4px;padding:3px 8px}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tx-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #252d3e}
.tx-name{font-weight:600;font-size:14px;color:#e8eaf0}
.tx-meta{font-size:12px;color:#7a869a;margin-top:3px}
.tx-amount{font-weight:700;font-size:14px;white-space:nowrap;margin-left:8px}
.btn-primary{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-weight:600;font-size:14px;color:#fff}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-weight:600;font-size:14px;background:#20293a;color:#e8eaf0;border:1px solid #252d3e}
.btn-icon{background:none;border:none;font-size:15px;padding:4px 6px;border-radius:6px;color:#7a869a}
.btn-icon.danger{color:#ef4444}
.btn-sm-group{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.btn-sm-group button{flex:1;min-width:50px;padding:5px 0;border-radius:7px;font-size:12px;font-weight:600;background:#20293a;color:#e8eaf0;border:1px solid #252d3e}
.form-group{margin-bottom:13px}
.form-label{display:block;font-size:12px;font-weight:600;color:#7a869a;margin-bottom:4px}
.form-input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #2d3a50;background:#20293a;color:#e8eaf0;font-size:14px}
.form-select{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #2d3a50;background:#20293a;color:#e8eaf0;font-size:14px;-webkit-appearance:none}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#1a2030;border:1px solid #252d3e;border-radius:14px;padding:22px;width:420px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-size:16px;font-weight:700;color:#e8eaf0}
.modal-close{background:none;border:none;font-size:20px;color:#7a869a;cursor:pointer;padding:0 4px;line-height:1}
.month-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.month-nav button{background:none;border:none;font-size:22px;color:#7a869a;padding:0 6px;line-height:1}
.month-nav span{font-weight:600;font-size:15px;color:#e8eaf0;min-width:100px;text-align:center}
.stabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.stab{padding:7px 14px;border-radius:8px;font-weight:600;font-size:14px;border:1px solid #252d3e;background:transparent;color:#7a869a}
.stab.active{color:#fff}
.obj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.pie-legend{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.pie-legend-row{display:flex;align-items:center;gap:6px;font-size:12px;color:#7a869a}
.pie-dot{width:10px;height:10px;border-radius:2px;display:inline-block;flex-shrink:0}
.red{color:#ef4444}.green{color:#10b981}.yellow{color:#f59e0b}.blue{color:#3b82f6}
.empty-state{text-align:center;padding:36px 0;color:#7a869a}
.empty-icon{font-size:34px;margin-bottom:10px}
.section-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}

/* ── LIGHT MODE ── */
body.light{background:#f1f5f9;color:#1a1f2e}
body.light #auth-root{background:#f1f5f9}
body.light .auth-form{background:#fff;border-color:#e2e8f0}
body.light .auth-title{color:#1a1f2e}
body.light #sidebar{background:#fff;border-color:#e2e8f0}
body.light .card{background:#fff;border-color:#e2e8f0}
body.light .kpi{border:1px solid #e2e8f0}
body.light .pbar-wrap{background:#e2e8f0}
body.light .pbar-rest{background:#f0f4f8}
body.light .tx-row{border-color:#e2e8f0}
body.light .tx-name{color:#1a1f2e}
body.light .form-input,body.light .form-select{background:#f8fafc;border-color:#cbd5e1;color:#1a1f2e}
body.light .btn-ghost{background:#f1f5f9;color:#1a1f2e;border-color:#e2e8f0}
body.light .btn-sm-group button{background:#f1f5f9;color:#1a1f2e;border-color:#e2e8f0}
body.light .modal-box{background:#fff;border-color:#e2e8f0}
body.light .modal-title,.body.light .tx-name,.body.light .card-title{color:#1a1f2e}
body.light .regle-widget{background:#f8fafc;border-color:#e2e8f0}
body.light .regle-row b{color:#1a1f2e}
body.light .nav-item,.body.light .logo-text,.body.light .month-nav span{color:#64748b}
body.light #hamburger{background:#f1f5f9;border-color:#e2e8f0}
body.light #hamburger span{background:#1a1f2e}
body.light #user-badge{background:#f1f5f9;border-color:#e2e8f0;color:#64748b}
body.light #user-menu{background:#fff;border-color:#e2e8f0}
body.light .user-menu-item{color:#1a1f2e}
body.light .user-menu-item:hover{background:#f1f5f9}

/* ── RESPONSIVE MOBILE ── */
@media(max-width:768px){
  #hamburger{display:flex}
  #sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);width:240px;min-width:240px;padding:20px 12px}
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.open{display:block}
  #header{padding:12px 14px 0;gap:10px}
  #content{padding:10px 14px 24px}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .kpi{padding:12px 14px}
  .kpi-val{font-size:17px}
  .grid-2-pie,.grid-2-hist{grid-template-columns:1fr}
  canvas{max-width:100%}
  .card{padding:14px 14px}
  .obj-grid{grid-template-columns:1fr}
  .modal-box{padding:18px}
  .auth-form{padding:24px 18px}
}
</style>
</head>
<body>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// TRIVIO — SECURITY LAYER
// ═══════════════════════════════════════════════════════════════════════════════

// ── SUPABASE CONFIG (clés publiques anon — sûres côté front-end) ──────────────
var _SB_U = 'https://xyqzdbrgztxfdplcfoff.supabase.co';
var _SB_K = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5cXpkYnJnenR4ZmRwbGNmb2ZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MDkxNjgsImV4cCI6MjA5NDA4NTE2OH0.jyUVfxX6Iv13ntFSueik8vKltCY8GuJr1ATP5qSN6n4';

// ── XSS SANITIZE ──────────────────────────────────────────────────────────────
// Nettoie TOUTE entrée utilisateur avant de l'afficher dans le DOM
// Transforme les caractères dangereux en entités HTML inoffensives
function sanitize(str){
  if(str===null||str===undefined)return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#x27;')
    .replace(/\//g,'&#x2F;')
    .replace(/`/g,'&#x60;')
    .replace(/=/g,'&#x3D;');
}

// Version sanitize pour les nombres (force un float valide)
function sanitizeNum(val){
  var n=parseFloat(val);
  return isNaN(n)?0:n;
}
function sanitizeInt(val,min,max){
  var n=parseInt(val);
  if(isNaN(n))return min||0;
  if(min!==undefined&&n<min)return min;
  if(max!==undefined&&n>max)return max;
  return n;
}

// ── RATE LIMITER (côté client) ────────────────────────────────────────────────
// Bloque les appels trop fréquents (bot, spam de formulaire)
// Complément du rate limiting serveur (Netlify/Supabase)
var _rateCounts={};
var _rateWindows={};
function rateLimited(action,maxCalls,windowMs){
  var now=Date.now();
  if(!_rateWindows[action]||now-_rateWindows[action]>windowMs){
    _rateWindows[action]=now;
    _rateCounts[action]=0;
  }
  _rateCounts[action]++;
  if(_rateCounts[action]>maxCalls){
    showRateError();
    return true;
  }
  return false;
}
function showRateError(){
  var existing=document.getElementById('rate-error');
  if(existing)return;
  var div=document.createElement('div');
  div.id='rate-error';
  div.style.cssText='position:fixed;top:16px;right:16px;background:#ef4444;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3)';
  div.textContent='⚠ Trop de tentatives. Attends quelques secondes.';
  document.body.appendChild(div);
  setTimeout(function(){if(div.parentNode)div.parentNode.removeChild(div);},3000);
}

// ── CSRF TOKEN ────────────────────────────────────────────────────────────────
// Génère un token unique par session pour valider les actions sensibles
var _csrfToken=(function(){
  var t=sessionStorage.getItem('_trv_csrf');
  if(!t){
    t=Array.from(crypto.getRandomValues(new Uint8Array(16))).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
    sessionStorage.setItem('_trv_csrf',t);
  }
  return t;
})();
function validCsrf(token){return token===_csrfToken;}

// ── INPUT VALIDATION ──────────────────────────────────────────────────────────
function validateEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email).toLowerCase());
}
function validatePassword(pw){
  // Min 8 chars, au moins 1 majuscule, 1 chiffre
  return typeof pw==='string'&&pw.length>=8&&/[A-Z]/.test(pw)&&/[0-9]/.test(pw);
}

// ── SUPABASE AUTH CLIENT ──────────────────────────────────────────────────────
var _supaToken=null;
var _supaUser=null;
var _supaRefreshToken=null;

function supaFetch(path,opts){
  var headers=Object.assign({'Content-Type':'application/json','apikey':_SB_K},opts&&opts.headers||{});
  if(_supaToken)headers['Authorization']='Bearer '+_supaToken;
  return fetchWithTimeout(_SB_U+path,Object.assign({},opts,{headers:headers}),8000);
}

// Inscription
function supaSignUp(email,password){
  return supaFetch('/auth/v1/signup',{
    method:'POST',
    body:JSON.stringify({email:email,password:password})
  }).then(function(r){return r.json();});
}

// Connexion
function supaSignIn(email,password){
  return supaFetch('/auth/v1/token?grant_type=password',{
    method:'POST',
    body:JSON.stringify({email:email,password:password})
  }).then(function(r){return r.json();});
}

// Déconnexion
function supaSignOut(){
  return supaFetch('/auth/v1/logout',{method:'POST'}).finally(function(){
    _supaToken=null;_supaUser=null;_supaRefreshToken=null;
    sessionStorage.removeItem('_trv_session');
    showAuthScreen();
  });
}

// Refresh token
function fetchWithTimeout(url,opts,ms){
  // Compatible tous navigateurs dont Safari iOS
  var fetchPromise=fetch(url,opts);
  var timeoutPromise=new Promise(function(_,reject){
    setTimeout(function(){reject(new Error('timeout'));},ms);
  });
  return Promise.race([fetchPromise,timeoutPromise]);
}

function supaRefresh(){
  var saved=sessionStorage.getItem('_trv_session');
  if(!saved)return Promise.resolve(null);
  var sess=JSON.parse(saved);
  var headers={'Content-Type':'application/json','apikey':_SB_K};
  return fetchWithTimeout(_SB_U+'/auth/v1/token?grant_type=refresh_token',{
    method:'POST',
    headers:headers,
    body:JSON.stringify({refresh_token:sess.refresh_token})
  },5000).then(function(r){return r.json();}).then(function(data){
    if(data.access_token){setSession(data);return data;}
    return null;
  }).catch(function(){return null;});
}

function setSession(data){
  _supaToken=data.access_token;
  _supaRefreshToken=data.refresh_token;
  _supaUser=data.user||{id:data.user_id,email:data.email};
  sessionStorage.setItem('_trv_session',JSON.stringify({
    access_token:data.access_token,
    refresh_token:data.refresh_token,
    user:_supaUser
  }));
}

// Chaque appel est protégé par le JWT de l'utilisateur + RLS Supabase
// → un user ne peut JAMAIS lire/écrire les données d'un autre

function supaGetData(){
  if(!_supaUser||!_supaUser.id)return Promise.resolve(null);
  return supaFetch('/rest/v1/trivio_data?select=data&user_id=eq.'+_supaUser.id,{
    headers:{'Accept':'application/json'}
  }).then(function(r){
    if(!r.ok){
      return r.text().then(function(t){
        console.warn('Supabase get error:',r.status,t);
        return null;
      });
    }
    return r.json();
  }).then(function(rows){
    if(rows&&rows.length>0)return rows[0].data;
    return null;
  }).catch(function(e){
    console.warn('supaGetData error:',e);
    return null;
  });
}

function supaSaveData(payload){
  if(!_supaUser||!_supaUser.id)return Promise.resolve();
  return supaFetch('/rest/v1/trivio_data',{
    method:'POST',
    headers:{
      'Prefer':'resolution=merge-duplicates',
      'Content-Type':'application/json'
    },
    body:JSON.stringify({
      user_id:_supaUser.id,
      data:payload,
      updated_at:new Date().toISOString()
    })
  }).then(function(r){
    if(!r.ok){
      return r.text().then(function(t){
        console.warn('Supabase save error:',r.status,t);
      });
    }
    return r;
  });
}

// ── PRÉLÈVEMENTS AUTO ─────────────────────────────────────────────────────────
function applyAutoPrelevements(){
  var now=new Date();
  var todayY=now.getFullYear(), todayM=now.getMonth(), todayD=now.getDate();
  S.prelvs.forEach(function(p){
    var key=p.id+'-'+todayY+'-'+todayM;
    if(S.plAppliques[key])return;
    if(todayD>=p.jour){
      var mk2=todayY+'-'+todayM;
      var list=S.txData[mk2]||[];
      var dejaTx=list.some(function(t){return t.autoPlId===p.id;});
      if(!dejaTx){
        var dateStr=todayY+'-'+pad2(todayM+1)+'-'+pad2(p.jour);
        list=[{id:Date.now()+p.id,nom:p.nom,montant:-p.montant,cat:p.cat,sous:p.sous,date:dateStr,autoPlId:p.id,auto:true}].concat(list);
        S.txData[mk2]=list;
        S.plAppliques[key]=true;
      }
    }
  });
  saveAll();
}
function pad2(n){return n<10?'0'+n:''+n;}

// ── CANVAS ────────────────────────────────────────────────────────────────────
function drawBarChart(id,data){
  var canvas=el(id);if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  var pad={l:42,r:8,t:8,b:24};
  var cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  var maxV=0;
  data.forEach(function(d){maxV=Math.max(maxV,d.charges+d.plaisirs+d.epargne);});
  if(maxV===0)maxV=100;
  var n=data.length,gap=Math.floor(cW/n),barW=Math.floor(gap*0.55);
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;
  for(var g=0;g<=4;g++){
    var gy=pad.t+cH*(1-g/4);
    ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(W-pad.r,gy);ctx.stroke();
    ctx.fillStyle='#7a869a';ctx.font='10px -apple-system,sans-serif';ctx.textAlign='right';
    ctx.fillText(Math.round(maxV*g/4),pad.l-4,gy+3);
  }
  data.forEach(function(d,i){
    var x=pad.l+i*gap+gap/2-barW/2;
    var cols=['#3b82f6',acc().main,'#f59e0b'];
    var vals=[d.charges,d.plaisirs,d.epargne];
    var yOff=pad.t+cH;
    vals.forEach(function(v,j){
      if(v<=0)return;
      var bh=Math.max(1,cH*v/maxV);
      yOff-=bh;
      ctx.fillStyle=cols[j];ctx.beginPath();ctx.rect(x,yOff,barW,bh);ctx.fill();
    });
    ctx.fillStyle='#7a869a';ctx.font='11px -apple-system,sans-serif';ctx.textAlign='center';
    ctx.fillText(d.mois,pad.l+i*gap+gap/2,H-4);
  });
}
function drawDonut(id,data){
  var canvas=el(id);if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  var total=data.reduce(function(s,d){return s+d.value;},0);
  if(total===0){ctx.fillStyle='#252d3e';ctx.beginPath();ctx.arc(W/2,H/2,60,0,Math.PI*2);ctx.fill();return;}
  var cx=W/2,cy=H/2,r=65,ri=42,start=-Math.PI/2;
  data.forEach(function(d){
    if(d.value<=0)return;
    var angle=2*Math.PI*d.value/total;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+angle);ctx.closePath();
    ctx.fillStyle=d.fill;ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,ri,0,Math.PI*2);
    ctx.fillStyle=S.theme==='clair'?'#fff':'#1a2030';ctx.fill();
    start+=angle+0.02;
  });
}

function updateSousCat(){

  if(!catEl||!sousEl)return;
  sousEl.innerHTML=sousCatOptions(catEl.value,'');
}
var _editTxId=null;
function openTxForm(tx){_editTxId=tx?tx.id:null;openModal(tx?'Modifier':'Nouvelle transaction',txFormHTML(tx));}
function openEditTx(id){var t=txList().find(function(x){return x.id===id;});if(t)openTxForm(t);}
function saveTx(){
  var nom=sanitize(el('m-nom').value.trim()),mont=sanitizeNum(el('m-mont').value);
  var cat=el('m-cat').value,sous=sanitize(el('m-sous').value),date=el('m-date').value;
  if(!nom||isNaN(mont))return;
  var tx={id:_editTxId||Date.now(),nom:nom,montant:mont,cat:cat,sous:sous,date:date};
  var list=txList();
  if(_editTxId){S.txData[mk()]=list.map(function(t){return t.id===tx.id?tx:t;});}
  else{S.txData[mk()]=[tx].concat(list);}
  saveAll();closeModal();pageTx();
}
function delTx(id){
  var tx=(S.txData[mk()]||[]).find(function(t){return t.id===id;});
  if(tx&&tx.auto&&tx.autoPlId){delete S.plAppliques[tx.autoPlId+'-'+S.curY+'-'+S.curM];}
  S.txData[mk()]=(S.txData[mk()]||[]).filter(function(t){return t.id!==id;});
  saveAll();pageTx();
}

// ── ÉPARGNES & OBJECTIFS (ancien onglet Objectifs) ────────────────────────────
function pageEpargnes(){
  var a=acc();
  var totC=S.objs.reduce(function(s,o){return s+o.cible;},0);
  var totA=S.objs.reduce(function(s,o){return s+o.actuel;},0);
  var pctGlobal=totC>0?Math.min(100,(totA/totC)*100):0;

  // Bande résumé en haut
  var rendementAnnuel=S.objs.reduce(function(s,o){return s+(o.actuel&&o.taux>0?o.actuel*(o.taux/100):0);},0);
  var summaryHTML='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px">'
    +'<div class="kpi card"><div class="kpi-label">Total épargné</div><div class="kpi-val yellow">'+fmt(totA)+'</div></div>'
    +'<div class="kpi card"><div class="kpi-label">Objectif total</div><div class="kpi-val">'+fmt(totC)+'</div></div>'
    +'<div class="kpi card"><div class="kpi-label">Progression globale</div><div class="kpi-val" style="color:'+a.main+'">'+pctGlobal.toFixed(1)+'%</div></div>'
    +'<div class="kpi card"><div class="kpi-label">Rendement annuel est.</div><div class="kpi-val green">+'+fmt(rendementAnnuel)+'</div></div>'
    +'</div>';

  var cards=S.objs.map(function(o){
    var pct=o.cible>0?Math.min(100,(o.actuel/o.cible)*100):0;
    var reste=Math.max(0,o.cible-o.actuel);
    var ds='';try{ds=new Date(o.echeance).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});}catch(e){}
    var badge='<span style="font-size:11px;background:'+(o.actif?a.bg:'rgba(107,114,128,.12)')+';color:'+(o.actif?a.main:'#6b7280')+';padding:2px 8px;border-radius:20px;font-weight:600;margin-left:8px">'+(o.actif?'Actif':'Inactif')+'</span>';
    return '<div class="card">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<span style="font-size:26px">'+(o.emoji||'🎯')+'</span>'
      +'<div><div style="font-weight:700;font-size:16px">'+o.nom+'</div>'
      +'<div style="font-size:12px;color:#7a869a;margin-top:2px">Échéance : '+ds+badge+'</div>'
      +'</div></div>'
      +'<div style="display:flex;gap:4px">'
      +'<button class="btn-icon" onclick="openEditObj('+o.id+')">✏</button>'
      +'<button class="btn-icon danger" onclick="delObj('+o.id+')">✕</button>'
      +'</div></div>'
      +'<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px">'
      +'<b style="color:'+a.main+'">'+fmt(o.actuel)+'</b>'
      +'<span style="color:#7a869a">'+fmt(o.cible)+' <span style="font-size:11px">(encore '+fmt(reste)+')</span></span>'
      +'</div>'
      +pbar(o.actuel,o.cible,a.main)
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">'
      +'<div style="height:4px;width:'+(pct.toFixed(0))+'%;background:'+a.main+';border-radius:2px;display:none"></div>'
      +'<span style="font-size:12px;color:'+a.main+';font-weight:600">'+pct.toFixed(1)+'%</span>'
      +'<span style="font-size:12px;color:#7a869a">'+pct.toFixed(0)+'% atteint</span>'
      +'</div>'
      +(o.livret||o.taux>0?'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px;padding:7px 10px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.12);border-radius:8px">'+(o.livret?'<span style="font-size:12px;color:#f59e0b;font-weight:600">📋 '+o.livret+'</span>':'')+(o.taux>0?'<span style="font-size:12px;color:#7a869a;margin-left:auto">'+o.taux+'% / an  ≈ +'+fmt(o.actuel*(o.taux/100))+'/an</span>':'')+(o.derniersInterets?'<span style="font-size:11px;color:#10b981">✓ +'+fmt(o.derniersInterets)+' crédités en '+o.derniereAnneeInterets+'</span>':'')+'</div>':'')
      +'<div class="btn-sm-group">'
      +'<button onclick="addProg('+o.id+',50)">+50 €</button>'
      +'<button onclick="addProg('+o.id+',100)">+100 €</button>'
      +'<button onclick="addProg('+o.id+',200)">+200 €</button>'
      +'<button onclick="openAddProgCustom('+o.id+')" style="flex:0;padding:5px 10px">+ autre</button>'
      +'</div></div>';
  }).join('');

  el('content').innerHTML=summaryHTML
    +'<div style="display:flex;justify-content:flex-end;margin-bottom:14px">'
    +'<button class="btn-primary" onclick="openObjForm(null)" style="background:'+a.main+'">+ Nouvel objectif</button></div>'
    +'<div class="obj-grid">'+cards+'</div>'
    +(S.objs.length===0?'<div class="empty-state"><div class="empty-icon">🏦</div><div style="margin-bottom:14px">Aucun objectif d\'épargne pour l\'instant.</div>'
      +'<button class="btn-primary" onclick="openObjForm(null)" style="background:'+a.main+'">Créer mon premier objectif</button></div>':'');
}

function addProg(id,a){
  S.objs=S.objs.map(function(o){return o.id===id?Object.assign({},o,{actuel:Math.min(o.cible,o.actuel+a)}):o;});
  saveAll();pageEpargnes();
}
function openAddProgCustom(id){
  openModal('Ajouter un montant',

    +'<input type="number" class="form-input" id="m-prog" placeholder="0.00"/></div>'

    +'<button class="btn-primary" onclick="saveProgCustom('+id+')" style="background:'+acc().main+'">Ajouter</button></div>'

function saveProgCustom(id){
  var v=parseFloat(el('m-prog').value);if(isNaN(v)||v<=0)return;

  saveAll();closeModal();pageEpargnes();
}
function delObj(id){S.objs=S.objs.filter(function(o){return o.id!==id;});saveAll();pageEpargnes();}

function openObjForm(o){_editObjId=o?o.id:null;openModal(o?'Modifier l\'objectif':'Nouvel objectif d\'épargne',objFormHTML(o));}

function saveObj(){
  var nom=sanitize(el('m-nom').value.trim()),cible=sanitizeNum(el('m-cible').value);
  var actuel=parseFloat(el('m-actuel').value)||0,ech=el('m-ech').value;

// ── INTÉRÊTS ANNUELS AUTO ─────────────────────────────────────────────────────
// Chaque 31 déc (ou au lancement si on est passé dessus), ajoute les intérêts
function applyInteretsAnnuels(){
  var now=new Date();
  var thisYear=now.getFullYear();
  // On regarde l'année précédente (les intérêts sont crédités le 31/12)
  var anneeRef=now.getMonth()===0&&now.getDate()<=5?thisYear-1:thisYear-1;
  var flagKey='interets_'+anneeRef;
  if(load(flagKey,false))return; // déjà appliqué pour cette année
  // Seulement si on est en janvier (les intérêts de l'année précédente viennent d'être versés)
  if(now.getMonth()!==0)return;
  var changed=false;
  S.objs=S.objs.map(function(o){
    if(!o.taux||o.taux<=0||!o.actuel)return o;
    var interets=Math.round(o.actuel*(o.taux/100)*100)/100;
    if(interets<=0)return o;
    changed=true;
    return Object.assign({},o,{actuel:o.actuel+interets,derniersInterets:interets,derniereAnneeInterets:anneeRef});
  });
  if(changed){
    persist(flagKey,true);
    saveAll();
  }
}

function doLogin(){
  // Rate limit : max 5 tentatives par 15 minutes
  if(rateLimited('login',5,15*60*1000))return;
  hideAuthError();
  var email=document.getElementById('a-email');
  var pw=document.getElementById('a-pw');
  if(!email||!pw)return;
  var emailVal=email.value.trim().toLowerCase();
  var pwVal=pw.value;
  if(!validateEmail(emailVal)){showAuthError('Email invalide.');return;}
  if(!pwVal||pwVal.length<6){showAuthError('Mot de passe trop court.');return;}
  var btn=document.querySelector('.auth-btn');
  if(btn){btn.disabled=true;btn.textContent='Connexion…';}
  supaSignIn(emailVal,pwVal).then(function(data){
    if(data.error||data.error_code){
      var msg=data.error_description||data.message||'Identifiants incorrects.';
      // Message générique pour éviter l'énumération d'emails
      showAuthError('Email ou mot de passe incorrect.');
      if(btn){btn.disabled=false;btn.textContent='Se connecter';}
      return;
    }
    setSession(data);
    loadUserData();
  }).catch(function(){
    showAuthError('Erreur réseau. Réessaie.');
    if(btn){btn.disabled=false;btn.textContent='Se connecter';}
  });
}

function doSignup(){
  if(rateLimited('signup',3,15*60*1000))return;
  hideAuthError();
  var emailVal=document.getElementById('a-email').value.trim().toLowerCase();
  var pwVal=document.getElementById('a-pw').value;
  var pw2Val=document.getElementById('a-pw2').value;
  if(!validateEmail(emailVal)){showAuthError('Email invalide.');return;}
  if(!validatePassword(pwVal)){showAuthError('Mot de passe : 8 caractères min, 1 majuscule, 1 chiffre.');return;}
  if(pwVal!==pw2Val){showAuthError('Les mots de passe ne correspondent pas.');return;}
  var btn=document.querySelector('.auth-btn');
  if(btn){btn.disabled=true;btn.textContent='Inscription…';}
  supaSignUp(emailVal,pwVal).then(function(data){
    if(data.error||data.error_code){
      showAuthError(data.error_description||data.message||'Erreur lors de l\'inscription.');
      if(btn){btn.disabled=false;btn.textContent='Créer mon compte';}
      return;
    }
    // Si email confirmation requise
    if(data.user&&data.user.confirmation_sent_at&&!data.session){
      showAuthError('');
      showAuthSuccess=document.getElementById('auth-error');
      var errEl=document.getElementById('auth-error');
      if(errEl){errEl.textContent='✅ Compte créé ! Vérifie ton email pour confirmer ton compte.';errEl.style.display='block';errEl.style.background='rgba(16,185,129,.15)';errEl.style.color='#10b981';errEl.style.borderColor='rgba(16,185,129,.3)';}
      if(btn){btn.disabled=false;btn.textContent='Créer mon compte';}
      return;
    }
    if(data.session){setSession(data.session);loadUserData();return;}
    setAuthMode('login');
  }).catch(function(){
    showAuthError('Erreur réseau. Réessaie.');
    if(btn){btn.disabled=false;btn.textContent='Créer mon compte';}
  });
}

function doForgot(){
  if(rateLimited('forgot',3,15*60*1000))return;
  var emailVal=document.getElementById('a-email').value.trim().toLowerCase();
  if(!validateEmail(emailVal)){showAuthError('Email invalide.');return;}
  supaFetch('/auth/v1/recover',{
    method:'POST',
    body:JSON.stringify({email:emailVal})
  }).then(function(){
    showAuthSuccess('✅ Email envoyé ! Vérifie ta boîte mail.');
  }).catch(function(){
    showAuthError('Erreur réseau.');
  });
}

  // Applique les données chargées (Supabase ou localStorage) au STATE
  if(data.theme)S.theme=data.theme;
  if(data.accent)S.accent=data.accent;
  if(data.regle)S.regle=data.regle;
  if(data.revenus)S.revenus=data.revenus;

  if(data.objs)S.objs=data.objs;
  if(data.plAppliques)S.plAppliques=data.plAppliques;
}

function loadFromLocalStorage(){
  // Charge depuis localStorage préfixé par user_id
  return {
    theme:    load('theme','sombre'),
    accent:   load('accent','emeraude'),
    regle:    load('regle',{charges:50,plaisirs:30,epargne:20}),
    revenus:  load('rev',{}),
    txData:   load('tx',{}),
    prelvs:   load('pl',[]),
    objs:     load('ob',[]),
    plAppliques: load('pl_applied',{})
  };
}

function bootApp(){
  clearAnonData(); // Supprime les anciennes clés non-préfixées
  applyAutoPrelevements();
  applyInteretsAnnuels();
  applyTheme();
  renderNav();
  setHeader();
  renderPage();
}

function loadUserData(){
  resetState(); // CRITICAL : remet à zéro avant de charger les données du user
  supaGetData().then(function(data){
    if(data){
      // Données trouvées dans Supabase → les utiliser
      applyDataToState(data);
      // Sync aussi dans localStorage préfixé (pour fallback offline)
      saveAll();
    } else {
      // Pas de données dans Supabase pour ce user
      // Tenter localStorage préfixé (si déjà utilisé offline)
      var localData = loadFromLocalStorage();
      var hasLocalData = localData.prelvs.length>0 || Object.keys(localData.txData).length>0;
      if(hasLocalData){
        applyDataToState(localData);
        // Uploader ces données locales vers Supabase
        saveAll();
      }
      // Sinon : compte vierge, state reste vide (DEFAULT_DATA implicite)
    }
    showAppScreen();
    bootApp();
  }).catch(function(){
    // Offline : charger depuis localStorage préfixé par user_id
    var localData = loadFromLocalStorage();
    applyDataToState(localData);
    showAppScreen();
    bootApp();
  });
}

// Surcharge saveAll : localStorage préfixé + sync Supabase
var _localSaveAll=saveAll;
saveAll=function(){
  if(!_supaUser||!_supaUser.id){
    console.warn('saveAll: pas de user connecté');
    return;
  }
  _localSaveAll(); // localStorage préfixé par user_id
  var payload={
    theme:S.theme,
    accent:S.accent,
    regle:S.regle,
    revenus:S.revenus,
    txData:S.txData,
    prelvs:S.prelvs,
    objs:S.objs,
    plAppliques:S.plAppliques
  };
  supaSaveData(payload).then(function(){
    // Sauvegarde réussie — indicateur visuel discret
    showSaveIndicator();
  }).catch(function(e){
    console.warn('Supabase sync error:', e);
  });
};

function showSaveIndicator(){
  var existing=document.getElementById('save-indicator');
  if(existing)return;
  var div=document.createElement('div');
  div.id='save-indicator';
  div.style.cssText='position:fixed;bottom:16px;right:16px;background:rgba(16,185,129,.9);color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;opacity:1;transition:opacity .5s';
  div.textContent='✓ Sauvegardé';
  document.body.appendChild(div);
  setTimeout(function(){
    div.style.opacity='0';
    setTimeout(function(){if(div.parentNode)div.parentNode.removeChild(div);},500);
  },1500);
}


// ── USER BADGE & LOGOUT ───────────────────────────────────────────────────────
function updateUserBadge(){
  var badge=document.getElementById('user-badge');
  var emailShort=document.getElementById('user-email-short');
  if(badge&&_supaUser){
    badge.style.display='flex';
    if(emailShort){
      var e=_supaUser.email||'';
      emailShort.textContent=e.split('@')[0];
      emailShort.title=e;
    }
  }
}
function toggleUserMenu(){
  var menu=document.getElementById('user-menu');
  if(menu)menu.classList.toggle('open');
}
document.addEventListener('click',function(e){
  var badge=document.getElementById('user-badge');
  var menu=document.getElementById('user-menu');
  if(badge&&menu&&!badge.contains(e.target)){menu.classList.remove('open');}
});
function doLogout(){supaSignOut();}
var _origShowApp2=showAppScreen;
showAppScreen=function(){_origShowApp2();updateUserBadge();};

// ── INIT SÉCURISÉ ─────────────────────────────────────────────────────────────
applyTheme();

// Affiche l'écran de login immédiatement par défaut
// (sera remplacé si une session valide existe)
showAuthScreen();

// Ensuite tente de restaurer la session en arrière-plan
(function(){
  var saved;
  try { saved = sessionStorage.getItem('_trv_session'); } catch(e) { saved = null; }
  if(!saved) return; // pas de session → on reste sur l'écran de login déjà affiché

  var sess;
  try { sess = JSON.parse(saved); } catch(e) {
    try { sessionStorage.removeItem('_trv_session'); } catch(e2) {}
    return;
  }

  if(!sess||!sess.access_token||!sess.refresh_token||!sess.user) return;

  _supaToken = sess.access_token;
  _supaRefreshToken = sess.refresh_token;
  _supaUser = sess.user;

  // Timeout 5s : si Supabase ne répond pas, on reste sur login
  var done = false;
  var timer = setTimeout(function(){
    if(done) return;
    done = true;
    _supaToken = null; _supaUser = null; _supaRefreshToken = null;
    try { sessionStorage.removeItem('_trv_session'); } catch(e) {}
    showAuthScreen();
  }, 5000);

  supaRefresh().then(function(data){
    if(done) return;
    done = true;
    clearTimeout(timer);
    if(data && data.access_token){
      loadUserData();
    } else {
      try { sessionStorage.removeItem('_trv_session'); } catch(e) {}
      showAuthScreen();
    }
  }).catch(function(){
    if(done) return;
    done = true;
    clearTimeout(timer);
    // Réseau indisponible : charge depuis le cache local
    loadUserData();
  });
})();
</script>
