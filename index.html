<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<!-- PWA — Trivio webapp -->
  <link rel="manifest" href="/manifest.json"/>

  <!-- PWA capabilities -->
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Trivio"/>
  <meta name="theme-color" content="#09090B"/>
  <meta name="application-name" content="Trivio"/>
  <link rel="apple-touch-icon" href="/icon-180.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png"/>
<title>Trivio</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Geist:wght@300;400;500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* ── TOKENS ── */
:root{
  --bg:#09090B;
  --s1:#111113;
  --s2:#17171a;
  --s3:#222225;
  --s4:#2c2c30;
  --glass:rgba(17,17,19,.88);
  --glass2:rgba(30,30,33,.95);
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.12);
  --accent:#22c55e;
  --accent-d:#16a34a;
  --accent-bg:rgba(34,197,94,.08);
  --accent-glow:rgba(34,197,94,.2);
  --red:#ff6b6b;
  --red-bg:rgba(255,107,107,.1);
  --gold:#ffd166;
  --blue:#5b8cff;
  --t1:#f0ede6;
  --t2:#9ba39e;
  --t3:#4d5550;
  --r1:8px;
  --r2:16px;
  --r3:22px;
  --rf:999px;
  /* safe areas */
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  /* layout */
  --hdr:52px;
  --nav:49px;
}

html{
  height:100%;
  height:100dvh;
  /* Couleur solide en fallback : couvre le fond blanc iOS sous 100dvh */
  background-color:#09090B;
  background:linear-gradient(to bottom,#1a1a26 0%,#0f0f16 45%,#09090B 100%) #09090B;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

body{
  height:100%;
  height:100dvh;
  overflow:hidden;
  font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:14px;
  color:var(--t1);
  background-color:#09090B;
  background:linear-gradient(to bottom,#1a1a26 0%,#0f0f16 45%,#09090B 100%) #09090B;
}

button{cursor:pointer;font-family:inherit;border:none;outline:none;}
input,select{font-family:inherit;outline:none;border:none;}
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:1px;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}

/* ═══════════════ AUTH ═══════════════ */
#auth{
  position:fixed;inset:0;
  background:linear-gradient(to top,#1c1c1e 0%,#111113 40%,#09090B 100%);
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(to bottom,#1a1a26 0%,#0f0f16 45%,#09090B 100%);
  padding:calc(var(--sat) + 24px) 24px calc(var(--sab) + 24px);
  z-index:9999;
}
.abox{
  background:var(--glass);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border2);
  border-radius:var(--r3);
  padding:32px 24px;
  width:100%;max-width:360px;
  box-shadow:0 40px 80px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05);
}
.alogo{display:flex;justify-content:center;margin-bottom:20px;}
.atitle{font-family:'Sora',sans-serif;font-size:22px;font-weight:700;text-align:center;margin-bottom:4px;color:var(--t1);letter-spacing:-.04em;}
.asub{font-size:13px;color:var(--t2);text-align:center;margin-bottom:24px;}
.aerr{background:var(--red-bg);border:1px solid rgba(255,107,107,.25);color:var(--red);border-radius:var(--r1);padding:10px 14px;font-size:13px;margin-bottom:12px;display:none;}
.aok{background:var(--accent-bg);border:1px solid rgba(34,197,94,.25);color:var(--accent);border-radius:var(--r1);padding:10px 14px;font-size:13px;margin-bottom:12px;display:none;}
.ainp{width:100%;padding:13px 16px;border-radius:var(--rf);border:1.5px solid var(--s4);background:var(--s2);color:var(--t1);font-size:15px;font-weight:500;margin-bottom:12px;display:block;letter-spacing:-.01em;transition:border-color .2s;}
.ainp:focus{border-color:var(--accent);}
.abtn{width:100%;padding:15px;border-radius:var(--rf);font-family:'Sora',sans-serif;font-weight:700;font-size:15px;color:#fff;background:var(--accent);border:none;cursor:pointer;margin-top:6px;letter-spacing:-.02em;transition:opacity .15s,transform .1s;box-shadow:0 4px 24px var(--accent-glow);}
.abtn:active{opacity:.88;transform:scale(.98);}
.abtn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;}
.alink{text-align:center;font-size:13px;color:var(--t2);margin-top:16px;}
.alink span{color:var(--accent);font-weight:600;cursor:pointer;}
.adiv{text-align:center;font-size:12px;color:var(--t3);margin:12px 0 4px;}
.abtn2{width:100%;padding:13px;border-radius:var(--rf);font-weight:600;font-size:14px;color:var(--t2);border:1.5px solid var(--s4);background:transparent;cursor:pointer;margin-top:6px;transition:all .15s;}
.abtn2:hover{border-color:var(--accent);color:var(--accent);}

/* ═══════════════ APP LAYOUT ═══════════════ */
#app{display:none;height:100vh;height:100dvh;overflow:hidden;}
#app.show{display:flex;padding-top:env(safe-area-inset-top,0px);}

/* sidebar desktop */
#sb{
  width:220px;min-width:220px;
  background:var(--glass);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:16px 12px;overflow-y:auto;flex-shrink:0;
}

/* main */
#main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0;min-height:0;}

/* ─ header ─ */
#hdr{
  display:flex;align-items:center;
  padding:14px 20px 12px;
  gap:10px;
  flex-shrink:0;
  background:transparent;
  /* backdrop-filter maintient la couche GPU iOS nécessaire pour que
     position:fixed fonctionne correctement — sans lui la nav se déplace */
  -webkit-backdrop-filter:blur(0px);
  backdrop-filter:blur(0px);
  z-index:50;
}
#hdr-txt{flex:1;min-width:0;}
#ptit{font-family:'Sora',sans-serif;font-size:19px;font-weight:700;color:var(--t1);letter-spacing:-.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#psub{font-size:11px;color:var(--t3);margin-top:2px;letter-spacing:-.01em;}
#tuto-help-btn{width:30px;height:30px;border-radius:50%;background:var(--s3);border:1px solid var(--s4);color:var(--t3);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
#tuto-help-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ─ user badge ─ */
#ubadge{display:flex;align-items:center;gap:7px;padding:4px 10px 4px 4px;border-radius:var(--rf);background:var(--s3);border:1px solid var(--s4);cursor:pointer;flex-shrink:0;position:relative;transition:border-color .15s;}
#ubadge:hover{border-color:var(--accent);}
.avatar-circle{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent-d),var(--accent));display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
#uem{font-size:12px;color:var(--t2);font-weight:500;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#umenu{display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--glass2);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border2);border-radius:var(--r2);padding:6px;min-width:160px;z-index:500;box-shadow:0 16px 48px rgba(0,0,0,.7);}
.umi{padding:10px 12px;border-radius:var(--r1);font-size:13px;color:var(--t1);cursor:pointer;display:flex;align-items:center;gap:8px;font-weight:500;transition:background .15s;}
.umi:hover{background:var(--s3);}
.umi.danger{color:var(--red);}

/* ─ content ─ */
#cnt{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 32px;}

/* ─ settings button ─ */
#settings-btn{width:32px;height:32px;border-radius:var(--r1);background:var(--s3);border:1px solid var(--s4);color:var(--t3);cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
#settings-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ─ hamburger ─ */
#hbg{display:none;flex-direction:column;justify-content:center;align-items:center;width:32px;height:32px;border-radius:var(--r1);background:var(--s3);border:1px solid var(--s4);gap:5px;flex-shrink:0;}
#hbg span{display:block;width:15px;height:1.5px;background:var(--t1);border-radius:1px;}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;}

/* ─ sidebar items ─ */
.logo{display:flex;align-items:center;gap:10px;padding:8px 8px 16px;border-bottom:1px solid var(--border);margin-bottom:12px;}
.logo-t{font-family:'Sora',sans-serif;font-weight:700;font-size:19px;color:var(--t1);letter-spacing:-.04em;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r1);cursor:pointer;font-size:13px;font-weight:500;color:var(--t3);margin-bottom:2px;transition:all .15s;user-select:none;}
.ni:hover{background:var(--s3);color:var(--t1);}
.ni.active{background:var(--accent-bg);color:var(--accent);font-weight:600;}
.ni span:first-child{font-size:15px;flex-shrink:0;}
.rw{border-radius:var(--r1);padding:12px;border:1px solid var(--border);margin-top:8px;background:var(--s2);}
.rw-t{font-size:10px;font-weight:600;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;}
.rr{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:2px;}
.rr b{color:var(--t1);}

/* ═══════════════ CARDS ═══════════════ */
.card{
  background:var(--glass);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:var(--r2);
  padding:16px 18px;
  margin-bottom:12px;
  box-shadow:0 2px 16px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.03);
}
.card:last-child{margin-bottom:0;}
.ctit{font-family:'Sora',sans-serif;font-weight:600;font-size:15px;color:var(--t1);margin-bottom:12px;letter-spacing:-.02em;}

/* hero card */
.hero-card{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-d) 100%);border-radius:var(--r2);padding:20px 18px;margin-bottom:12px;box-shadow:0 8px 32px var(--accent-glow);position:relative;overflow:hidden;}
.hero-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(255,255,255,.08);border-radius:50%;}
.hero-label{font-size:10px;font-weight:600;color:rgba(0,0,0,.55);margin-bottom:6px;display:flex;align-items:center;gap:4px;position:relative;z-index:1;letter-spacing:.04em;text-transform:uppercase;}
.hero-amount{font-family:'Sora',sans-serif;font-size:34px;font-weight:700;color:#052e16;letter-spacing:-.04em;line-height:1;margin-bottom:4px;position:relative;z-index:1;}
.hero-sub{font-size:12px;color:rgba(0,0,0,.45);font-weight:500;position:relative;z-index:1;}

/* stat cards */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.stat-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;}
.stat-label{font-size:10px;color:var(--t3);margin-bottom:6px;display:flex;align-items:center;gap:4px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
.stat-amount{font-family:'Sora',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.04em;}

/* kpi */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;}
.kpi{border-radius:var(--r2);padding:14px 16px;background:var(--glass);border:1px solid var(--border);}
.klab{font-size:10px;color:var(--t3);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.kval{font-family:'Sora',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.04em;}

/* 2-col grids */
.g2,.g2pie,.g2his{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}

/* donut legend */
.pl{display:flex;flex-direction:column;gap:5px;margin-top:10px;}
.plr{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t2);font-weight:500;}
.pld{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

/* progress bars */
.pb{height:3px;border-radius:2px;background:var(--s4);overflow:hidden;margin:5px 0;}
.pbf{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.prest{font-size:11px;color:var(--t2);margin-top:3px;display:block;font-weight:500;}

/* tags */
.tag{display:inline-block;padding:2px 8px;border-radius:var(--rf);font-size:11px;font-weight:600;}

/* tx rows */
.txrow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.txrow:last-child{border-bottom:none;}
.txn{font-weight:600;font-size:14px;color:var(--t1);letter-spacing:-.02em;}
.txm{font-size:11px;color:var(--t3);margin-top:2px;}
.txa{font-family:'Sora',sans-serif;font-weight:600;font-size:14px;white-space:nowrap;margin-left:8px;}

/* notif bar */
.notif-bar{display:flex;align-items:flex-start;gap:12px;background:var(--accent-bg);border:1px solid rgba(34,197,94,.15);border-radius:var(--r2);padding:14px 16px;margin-bottom:16px;}
.notif-icon{font-size:16px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;}
.notif-text{font-size:13px;color:var(--t2);line-height:1.5;font-weight:500;}
.notif-text b{color:var(--t1);}

/* empty */
.emp{text-align:center;padding:48px 0;color:var(--t3);}
.empty-wrap{display:flex;flex-direction:column;align-items:center;padding:48px 20px;text-align:center;}
.empty-icon-wrap{width:52px;height:52px;border-radius:var(--r2);background:var(--s3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:14px;}
.empty-title{font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:var(--t1);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--t3);line-height:1.5;max-width:240px;}

/* ═══════════════ BUTTONS ═══════════════ */
.bp{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--rf);font-family:'Sora',sans-serif;font-weight:700;font-size:13px;color:#fff;background:var(--accent);box-shadow:0 4px 20px var(--accent-glow);transition:opacity .15s,transform .1s;white-space:nowrap;letter-spacing:-.02em;}
.bp:active{opacity:.8;transform:scale(.97);}
.bg{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--rf);font-weight:600;font-size:13px;color:var(--t2);border:1px solid var(--s4);background:var(--s3);transition:all .15s;letter-spacing:-.01em;}
.bg:hover{border-color:var(--accent);color:var(--accent);}
.bi{background:none;border:none;font-size:14px;padding:4px 7px;border-radius:var(--r1);color:var(--t3);transition:color .15s;}
.bi:hover{color:var(--t1);}
.bi.d{color:var(--red);}
.bsg{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.bsg button{flex:1;min-width:52px;padding:9px 4px;border-radius:var(--rf);font-family:'Sora',sans-serif;font-size:12px;font-weight:600;background:var(--s3);color:var(--t1);border:1px solid var(--s4);transition:all .15s;}
.bsg button:active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}

/* ═══════════════ FORMS ═══════════════ */
.fg{margin-bottom:14px;}
.fl{display:block;font-size:10px;font-weight:600;color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em;}
.fi{width:100%;padding:12px 16px;border-radius:var(--rf);border:1.5px solid var(--s4);background:var(--s2);color:var(--t1);font-size:14px;font-weight:500;transition:border-color .2s;letter-spacing:-.01em;}
.fi:focus{border-color:var(--accent);}
.fs{width:100%;padding:12px 16px;border-radius:var(--rf);border:1.5px solid var(--s4);background:var(--s2);color:var(--t1);font-size:14px;-webkit-appearance:none;}
.fa{display:flex;gap:10px;justify-content:flex-end;margin-top:10px;}

/* ═══════════════ MODAL ═══════════════ */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:flex-end;justify-content:center;}
.mbox{background:var(--glass2);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border2);border-radius:var(--r3) var(--r3) 0 0;padding:6px 20px calc(var(--sab) + 28px);width:100%;max-width:480px;max-height:90dvh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.6);}
.mbox::before{content:'';display:block;width:36px;height:4px;border-radius:2px;background:var(--s4);margin:12px auto 18px;}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.mtit{font-family:'Sora',sans-serif;font-size:16px;font-weight:600;color:var(--t1);letter-spacing:-.02em;}
.mclose{background:var(--s3);border:none;font-size:15px;color:var(--t3);cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;}

/* ═══════════════ MONTH NAV ═══════════════ */
.mnav{display:flex;align-items:center;gap:16px;margin-bottom:16px;padding:6px 0;}
.mnav button{background:none;border:none;font-size:20px;color:var(--t3);padding:0 2px;transition:color .15s;cursor:pointer;}
.mnav button:hover{color:var(--accent);}
.mnav span{font-family:'Sora',sans-serif;font-weight:600;font-size:15px;color:var(--t1);letter-spacing:-.02em;}

/* ═══════════════ SETTINGS TABS ═══════════════ */
.stabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.stab{padding:8px 16px;border-radius:var(--rf);font-weight:600;font-size:12px;border:1px solid var(--s4);background:transparent;color:var(--t3);transition:all .15s;letter-spacing:-.01em;}
.stab.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 16px var(--accent-glow);}

/* ═══════════════ OBJECTIFS ═══════════════ */
.ogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}

/* ═══════════════ MISC ═══════════════ */
.red{color:var(--red);}
.grn{color:var(--accent);}
.yel{color:var(--gold);}
.blue{color:var(--blue);}
.srow{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.saved{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:var(--accent);color:#052e16;padding:8px 20px;border-radius:var(--rf);font-size:12px;font-weight:700;z-index:9999;transition:opacity .4s;box-shadow:0 4px 20px var(--accent-glow);white-space:nowrap;}

/* ═══════════════ SIC ═══════════════ */
.sic-controls{display:flex;flex-direction:column;gap:14px;margin-bottom:16px;}
.sic-ctrl{display:flex;flex-direction:column;gap:6px;}
.sic-label{font-size:12px;font-weight:600;color:var(--t2);}
.sic-slider{-webkit-appearance:none;appearance:none;width:100%;height:3px;border-radius:2px;background:var(--s4);outline:none;}
.sic-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 8px var(--accent-glow);}
.sic-inp-wrap{display:flex;align-items:center;border:1px solid var(--s4);border-radius:var(--r1);background:var(--s2);overflow:hidden;transition:border-color .2s;}
.sic-inp-wrap:focus-within{border-color:var(--accent);}
.sic-inp{flex:1;border:none;background:transparent;padding:11px 4px 11px 14px;color:var(--t1);font-size:16px;font-weight:600;text-align:right;min-width:0;}
.sic-unit{padding:11px 14px 11px 6px;color:var(--t3);font-size:13px;font-weight:500;white-space:nowrap;flex-shrink:0;}

/* ═══════════════ LIGHT MODE ═══════════════ */
body.light{
  background:#f0f0f2;color:#111113;
  --bg:#f0f0f2;--s1:#fff;--s2:#f5f5f7;--s3:#ebebed;--s4:#d8d8dc;

}

body.light .bn-icon,body.light .bn-label{color:#8e8e94;}

/* ═══════════════ MOBILE ═══════════════ */
@media(max-width:768px){

  /* hamburger hidden on mobile — bottom nav handles navigation */
  #hbg{display:none;}
  #settings-btn{display:flex;}

  /* sidebar mobile : drawer depuis la gauche */
  #sb{
    display:none;
    position:fixed;
    top:0;left:0;bottom:0;
    width:78%;max-width:280px;
    z-index:200;
    padding-top:calc(var(--sat) + 16px);
    transform:translateX(-100%);
    transition:transform .3s cubic-bezier(.4,0,.2,1);
    background:var(--glass2);
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border-right:1px solid var(--border2);
  }
  #sb.open{display:flex;transform:translateX(0);}
  #ov.open{display:block;}
  #app{flex-direction:column;}

  /* header : décalé vers le bas selon la Dynamic Island */
  #hdr{padding:10px 16px 10px;}
  #ptit{font-size:17px !important;}
  #psub{display:none;}

  /* content : espace sous le contenu = items nav (49px) + safe area + marge */
  #cnt{padding:16px 16px 110px;} /* 58 pilule + 34 bottom + 18 marge */

  /* grids */
  .kgrid{grid-template-columns:repeat(2,1fr);gap:8px;}
  .kval{font-size:15px;}
  .g2pie,.g2his,.g2{grid-template-columns:1fr !important;}
  .ogrid{grid-template-columns:1fr;}
  .sic-controls{flex-direction:column;}
  .sic-results,.sic-results-row{grid-template-columns:1fr 1fr;}
  .card{padding:13px 15px;}
  .mbox{border-radius:var(--r3) var(--r3) 0 0;max-height:88dvh;}
  .mov{align-items:flex-end;}
  .avatar-circle{width:24px;height:24px;font-size:9px;}
  #uem{font-size:11px;max-width:65px;}

  /* ─ BOTTOM NAV — pilule flottante ──────────────────────────────────
     bottom:34px = ras du home indicator iPhone Face ID (valeur fixe Apple).
     Pas de ::after — la pilule flotte, le fond de body couvre le reste. ─ */
  #app.show ~ #bottom-nav{
    display:flex;
    flex-direction:row;
    position:fixed;
    bottom:34px;
    left:16px;right:16px;
    height:58px;
    padding:0 4px;
    background:rgba(22,24,26,0.88);
    -webkit-backdrop-filter:blur(24px);
    backdrop-filter:blur(24px);
    border:0.5px solid rgba(255,255,255,.1);
    border-radius:9999px;
    box-shadow:0 8px 32px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.3);
    z-index:300;
    align-items:center;
  }
  body.light #app.show ~ #bottom-nav{
    background:rgba(245,245,247,.88);
    border:0.5px solid rgba(0,0,0,.08);
    box-shadow:0 8px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);
  }

  .bn-item{
    flex:1;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:4px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    transition:opacity .1s;
    border-radius:9999px;
    padding:6px 4px;
  }
  .bn-item:active{opacity:.5;}
  .bn-icon{
    width:24px;height:24px;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
    color:rgba(255,255,255,.38);
    transition:color .15s;flex-shrink:0;
  }
  .bn-label{
    font-size:9px;font-weight:600;
    color:rgba(255,255,255,.38);
    letter-spacing:.02em;text-transform:uppercase;
    transition:color .15s;
    font-family:'Geist',sans-serif;
  }
  body.light .bn-icon,body.light .bn-label{color:rgba(0,0,0,.35);}
  .bn-item.active .bn-icon,.bn-item.active .bn-label{color:var(--accent);}
  body.light .bn-item.active .bn-icon,body.light .bn-item.active .bn-label{color:var(--accent);}

}

    var swCode = `
const CACHE='trivio-v3';
const FILES=['/'];
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(FILES)));
  self.skipWaiting();
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
});
`;
    var blob = new Blob([swCode],{type:'application/javascript'});
    var swUrl = URL.createObjectURL(blob);

function sbFetch(path, opts){
  var h = {
    'Content-Type':'application/json',
    'apikey': _k
  };
  if(TOKEN) h['Authorization'] = 'Bearer '+TOKEN;
  if(opts && opts.extraHeaders){
    for(var k in opts.extraHeaders) h[k] = opts.extraHeaders[k];
  }
  var o = {method: opts&&opts.method||'GET', headers: h};
  if(opts && opts.body) o.body = opts.body;

  var p = fetch(_u+path, o);
  var t = new Promise(function(_,rej){setTimeout(function(){rej(new Error('timeout'));},8000);});
  return Promise.race([p,t]);
}

// ── AUTH SUPABASE ─────────────────────────────────────
function sbSignIn(email,pw){
  return sbFetch('/auth/v1/token?grant_type=password',{
    method:'POST',
    body:JSON.stringify({email:email,password:pw})
  }).then(function(r){return r.json();});
}
function sbSignUp(email,pw){
  var redirectTo = window.location.origin + window.location.pathname;
  return sbFetch('/auth/v1/signup',{
    method:'POST',
    body:JSON.stringify({
      email:email,
      password:pw,
      options:{emailRedirectTo:redirectTo}
    })
  }).then(function(r){return r.json();});
}
function sbSignOut(){
  return sbFetch('/auth/v1/logout',{method:'POST'}).catch(function(){});
}
function sbRefresh(rt){
  return fetch(_u+'/auth/v1/token?grant_type=refresh_token',{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':_k},
    body:JSON.stringify({refresh_token:rt})
  }).then(function(r){return r.json();});
}
function sbRecover(email){
  return sbFetch('/auth/v1/recover',{
    method:'POST',
    body:JSON.stringify({email:email})
  });
}

function setSession(data){
  TOKEN = data.access_token;
  REFRESH = data.refresh_token;
  USER = data.user || {id:data.user_id, email:data.email};
  try{
    sessionStorage.setItem('_ts', JSON.stringify({
      t:TOKEN, r:REFRESH,
      u:USER,
      exp: Date.now() + 3600000
    }));
  }catch(e){}
}
function clearSession(){
  TOKEN=null; REFRESH=null; USER=null;

// ── DATA SUPABASE ─────────────────────────────────────
function dbLoad(){
  if(!USER) return Promise.resolve(null);
  return sbFetch('/rest/v1/trivio_data?select=data&user_id=eq.'+USER.id, {
    extraHeaders:{'Accept':'application/json'}
  }).then(function(r){
    if(!r.ok) return null;
    return r.json();
  }).then(function(rows){
    return (rows && rows.length>0) ? rows[0].data : null;
  }).catch(function(){return null;});
}

function dbSave(){
  if(!USER||!TOKEN) return;
  // Snapshot des données actuelles
  var snap = {
    theme:S.theme, accent:S.accent, regle:S.regle,
    revenus:S.revenus, txData:S.txData,
    prelvs:S.prelvs, objs:S.objs, plDone:S.plDone,
    tutoEpargneDone:S.tutoEpargneDone, onboardingDone:S.onboardingDone
  };
  // Backup roulant : garder max 5 versions (1 par heure min)
  var _now = Date.now();
  var bkps = Array.isArray(S._backups) ? S._backups : [];
  var _lastBk = bkps.length ? new Date(bkps[0].ts).getTime() : 0;
  if(_now - _lastBk > 3600000) {
    bkps = [{ts:new Date().toISOString(), d:snap}].concat(bkps).slice(0,5);
    S._backups = bkps;
  }
  var payload = {
    user_id: USER.id,
    data: Object.assign({}, snap, {_backups: S._backups||[]}),
    updated_at: new Date().toISOString()
  };
  var body = JSON.stringify(payload);
  var h = {
    'Content-Type':'application/json',
    'apikey':_k,
    'Authorization':'Bearer '+TOKEN,
    'Prefer':'resolution=merge-duplicates,return=minimal'
  };
  // UPSERT : essai PATCH d\'abord, puis POST si nouveau
  fetch(_u+'/rest/v1/trivio_data?user_id=eq.'+USER.id,{
    method:'PATCH', headers:h, body:body
  }).then(function(r){
    if(r.status===204) return showSaved();
    // Pas de ligne modifiée → INSERT
    return fetch(_u+'/rest/v1/trivio_data',{
      method:'POST', headers:h, body:body
    }).then(function(r2){
      if(r2.status===201||r2.status===200||r2.status===204) showSaved();
    });
  }).catch(function(e){console.warn('dbSave:',e);});

  // Backup localStorage préfixé
  try{localStorage.setItem('_td_'+USER.id, JSON.stringify(payload.data));}catch(e){}
}

function showSaved(){
  var ex=$('saved-ind');
  if(ex) return;
  var d=document.createElement('div');
  d.id='saved-ind';
  d.className='saved';
  d.textContent='✓ Sauvegardé';
  document.body.appendChild(d);
  setTimeout(function(){d.style.opacity='0';setTimeout(function(){if(d.parentNode)d.parentNode.removeChild(d);},500);},1500);
}

function applyData(data){

// ── AUTO PRÉLÈVEMENTS ─────────────────────────────────
function autoPrelevements(){
  var now=new Date();
  var ty=now.getFullYear(), tm=now.getMonth(), td=now.getDate();
  var changed=false;
  S.prelvs.forEach(function(p){
    var key=p.id+'-'+ty+'-'+tm;
    if(S.plDone[key]) return;
    if(td>=p.jour){
      var mk2=ty+'-'+tm;
      var list=S.txData[mk2]||[];
      var exists=list.some(function(t){return t.autoId===p.id;});
      if(!exists){
        list=[{
          id:Date.now()+p.id,
          nom:san(p.nom), montant:-p.montant,
          cat:p.cat, sous:p.sous,
          date:ty+'-'+pad2(tm+1)+'-'+pad2(p.jour),
          autoId:p.id, auto:true
        }].concat(list);
        S.txData[mk2]=list;
        S.plDone[key]=true;
        changed=true;
      }
    }
  });
  if(changed) dbSave();
}

// ── INTÉRÊTS ANNUELS ──────────────────────────────────
function autoInterets(){
  var now=new Date();
  var annee=now.getFullYear();
  if(now.getMonth()!==0||now.getDate()!==1) return;
  var key='int-'+annee;
  if(S.plDone[key]) return;
  var changed=false;
  S.objs.forEach(function(o){
    if(o.taux&&o.taux>0&&o.actuel>0){
      o.actuel=Math.round((o.actuel*(1+o.taux/100))*100)/100;
      changed=true;
    }
  });
  if(changed){S.plDone[key]=true;dbSave();}
}

function drawBar(id,data){
  var c=document.getElementById(id); if(!c) return;
  var dpr=window.devicePixelRatio||1;
  var rect=c.getBoundingClientRect();
  c.width=rect.width*dpr; c.height=rect.height*dpr;
  var ctx=c.getContext('2d');
  ctx.scale(dpr,dpr);
  var W=rect.width,H=rect.height;
  ctx.clearRect(0,0,W,H);
  var pad={l:42,r:8,t:8,b:24};
  var cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  var maxV=0;
  data.forEach(function(d){maxV=Math.max(maxV,d.c+d.p+d.e);});
  if(!maxV) maxV=100;
  var n=data.length, gap=Math.floor(cW/n), bw=Math.floor(gap*.55);
  ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1;
  for(var g=0;g<=4;g++){
    var gy=pad.t+cH*(1-g/4);
    ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(W-pad.r,gy);ctx.stroke();
    ctx.fillStyle='#7a869a'; ctx.font='10px -apple-system,sans-serif'; ctx.textAlign='right';
    ctx.fillText(Math.round(maxV*g/4),pad.l-4,gy+3);
  }
  data.forEach(function(d,i){
    var x=pad.l+i*gap+gap/2-bw/2;
    var cols=['#5b8cff',acc().main,'#ffd166'];
    var vals=[d.c,d.p,d.e];
    var yo=pad.t+cH;
    vals.forEach(function(v,j){
      if(!v) return;
      var bh=Math.max(1,cH*v/maxV); yo-=bh;
      ctx.fillStyle=cols[j]; ctx.beginPath(); ctx.rect(x,yo,bw,bh); ctx.fill();
    });
    ctx.fillStyle='#7a869a'; ctx.font='11px -apple-system,sans-serif'; ctx.textAlign='center';
    ctx.fillText(d.mois,pad.l+i*gap+gap/2,H-4);
  });
}
function drawDonut(id,data){
  var c=document.getElementById(id); if(!c) return;
  var dpr=window.devicePixelRatio||1;
  var rect=c.getBoundingClientRect();
  var W=rect.width||220, H=rect.height||160;
  c.width=W*dpr; c.height=H*dpr;
  c.style.width=W+'px'; c.style.height=H+'px';
  var ctx=c.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  var total=data.reduce(function(s,d){return s+d.v;},0);
  if(!total){ctx.fillStyle='#252d3e';ctx.beginPath();ctx.arc(W/2,H/2,60,0,Math.PI*2);ctx.fill();return;}
  var cx=W/2,cy=H/2,r=65,ri=42,st=-Math.PI/2;
  data.forEach(function(d){
    if(!d.v) return;
    var ang=2*Math.PI*d.v/total;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,st,st+ang);ctx.closePath();
    ctx.fillStyle=d.fill;ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,ri,0,Math.PI*2);
    ctx.fillStyle=S.theme==='clair'?'#f0f0f5':'#090910';ctx.fill();
    st+=ang+.02;
  });
}

function openTxForm(tx){_etid=tx?tx.id:null;openM(tx?'Modifier':'Nouvelle transaction',txForm(tx));}
function openEditTx(id){var t=txList().find(function(x){return x.id===id;});if(t)openTxForm(t);}
function saveTx(){
  var nom=san($('m-nom').value.trim()), mont=parseFloat($('m-mont').value);
  if(!nom||isNaN(mont)) return;
  var objSel=$('m-obj');
  var objId=objSel?objSel.value:'';
  var tx={id:_etid||Date.now(),nom:nom,montant:mont,cat:$('m-cat').value,sous:san($('m-sous').value),date:$('m-date').value,objId:objId};
  var list=txList();
  // Si catégorie Épargne et objectif sélectionné → mettre à jour l'objectif
  if(tx.cat==='Épargne' && objId){
    var montant=Math.abs(mont);
    S.objs=S.objs.map(function(o){
      if(o.id==objId){
        // Si on modifie une tx existante, annuler l'ancien montant d'abord
        if(_etid){
          var oldTx=list.find(function(t){return t.id==_etid;});
          if(oldTx&&oldTx.cat==='Épargne'&&oldTx.objId==objId){
            o.actuel=Math.max(0,o.actuel-Math.abs(oldTx.montant));
          }
        }
        o.actuel=Math.min(o.cible,o.actuel+montant);
      }
      return o;
    });
  }
  if(_etid) S.txData[mk()]=list.map(function(t){return t.id===tx.id?tx:t;});
  else S.txData[mk()]=[tx].concat(list);
  dbSave(); closeM(); pageTxCombined();
}
function delTx(id){
  var t=(S.txData[mk()]||[]).find(function(x){return x.id===id;});
  if(t&&t.auto&&t.autoId) delete S.plDone[t.autoId+'-'+S.y+'-'+S.m];
  // Si c'était une épargne liée à un objectif, annuler la mise à jour
  if(t&&t.cat==='Épargne'&&t.objId){
    S.objs=S.objs.map(function(o){
      if(o.id==t.objId) o.actuel=Math.max(0,o.actuel-Math.abs(t.montant));
      return o;
    });
  }
  S.txData[mk()]=(S.txData[mk()]||[]).filter(function(t){return t.id!==id;});
  dbSave(); pageTxCombined();
}

function savePl(){
  var nom=san($('m-nom').value.trim()); if(!nom) return;
  var p={id:_epid||Date.now(),nom:nom,
    montant:Math.abs(parseFloat($('m-mont').value)||0),
    jour:Math.min(31,Math.max(1,parseInt($('m-jour').value)||1)),
    cat:$('m-cat').value,
    sous:san($('m-sous').value)};
  if(_epid) S.prelvs=S.prelvs.map(function(x){return x.id===p.id?p:x;});

}

function saveRegle(){

  S.regle={charges:c,plaisirs:p,epargne:e};
  dbSave(); renderNav(); pageParams();
}

  if(fns[page]) fns[page]();
}

function sicApplySliderColors(){
  var a = acc();
  var sliders = ['sic-cap','sic-men','sic-taux','sic-dur'];
  sliders.forEach(function(id){
    var el = document.getElementById(id); if(!el) return;
    var pct = (((parseFloat(el.value)-parseFloat(el.min))/(parseFloat(el.max)-parseFloat(el.min)))*100).toFixed(1);
    el.style.background = 'linear-gradient(to right, '+a.main+' 0%, '+a.main+' '
      + pct + '%, #252d3e ' + pct + '%, #252d3e 100%)';
    el.style.borderRadius = '3px';
  });
  // Couleur thumb
  var style = document.getElementById('sic-thumb-style');
  if(!style){
    style = document.createElement('style');
    style.id = 'sic-thumb-style';
    document.head.appendChild(style);
  }
  style.textContent = '.sic-slider::-webkit-slider-thumb{background:'+a.main+'}';
}

// Slider → met à jour l'input texte et recalcule
function sicUpdSlider(field){
  var sliders = {cap:'sic-cap', men:'sic-men', taux:'sic-taux', dur:'sic-dur'};
  var inputs  = {cap:'sic-i-cap', men:'sic-i-men', taux:'sic-i-taux', dur:'sic-i-dur'};
  var sl = document.getElementById(sliders[field]);
  var inp = document.getElementById(inputs[field]);
  if(!sl) return;
  var v = parseFloat(sl.value)||0;
  if(inp) inp.value = v;
  sicApplyField(field, v);
}

// Input texte → met à jour le slider et recalcule
function sicUpdInput(field){
  var sliders = {cap:'sic-cap', men:'sic-men', taux:'sic-i-taux', dur:'sic-i-dur'};
  var inputs  = {cap:'sic-i-cap', men:'sic-i-men', taux:'sic-i-taux', dur:'sic-i-dur'};
  var slMap   = {cap:'sic-cap',   men:'sic-men',   taux:'sic-taux',   dur:'sic-dur'};
  var inp = document.getElementById(inputs[field]);
  var sl  = document.getElementById(slMap[field]);
  if(!inp) return;
  var v = parseFloat(inp.value)||0;
  // Mettre à jour le slider si la valeur est dans sa plage
  if(sl){
    var min=parseFloat(sl.min), max=parseFloat(sl.max);
    if(v>=min && v<=max) sl.value=v;
  }
  sicApplyField(field, v);
}

function sicApplyField(field, v){
  if(field==='cap')  SIC.capital    = Math.max(0,v);
  if(field==='men')  SIC.mensualite = Math.max(0,v);
  if(field==='taux') SIC.taux       = Math.max(0,Math.min(100,v));
  if(field==='dur')  SIC.duree      = Math.max(1,Math.min(100,Math.round(v)));
  sicApplySliderColors();
  sicCalc();
}

function sicCalc(){
  var cap  = SIC.capital;
  var men  = SIC.mensualite;
  var taux = SIC.taux / 100;
  var years= SIC.duree;
  var a    = acc();

  // Calcul annuel
  var dataAvec  = []; // avec intérêts composés
  var dataSans  = []; // sans intérêts
  var dataInter = []; // intérêts cumulés
  var tableau   = [];

  var capitalAvec = cap;
  var capitalSans = cap;
  var interetsCum = 0;

  dataAvec.push(cap);
  dataSans.push(cap);
  dataInter.push(0);

  for(var y = 1; y <= years; y++){
    // Avec intérêts : mensuel pour précision
    var prevAvec = capitalAvec;
    var tauxM = taux / 12;
    for(var m = 0; m < 12; m++){
      capitalAvec = capitalAvec * (1 + tauxM) + men;
    }
    interetsCum += capitalAvec - prevAvec - men*12;

    // Sans intérêts
    capitalSans += men * 12;

    dataAvec.push(capitalAvec);
    dataSans.push(capitalSans);
    dataInter.push(interetsCum);

    tableau.push({
      annee: y,
      totalAvec: capitalAvec,
      versements: cap + men*12*y,
      interets: interetsCum,
      rendement: capitalSans > 0 ? ((capitalAvec - capitalSans)/capitalSans*100) : 0
    });
  }

  // Mettre à jour le graphique
  sicDrawChart(dataAvec, dataSans, dataInter, years, a);

  // Mettre à jour les KPIs
  var finalAvec = dataAvec[years];
  var finalSans = dataSans[years];
  var totalVers = cap + men*12*years;
  var gainInter = finalAvec - totalVers;

  document.getElementById('sic-res').innerHTML =
    '<div class="sic-kpis">'
    +'<div class="sic-kpi">'
    +'<div class="sic-kpi-label">Capital final</div>'
    +'<div class="sic-kpi-val" style="color:'+a.main+'">'+Math.round(finalAvec).toLocaleString('fr-FR',{useGrouping:false})+' €</div>'
    +'<div class="sic-kpi-sub">avec intérêts · après '+years+' an'+(years>1?'s':'')+' </div>'
    +'</div>'
    +'<div class="sic-kpi">'
    +'<div class="sic-kpi-label">Intérêts générés</div>'
    +'<div class="sic-kpi-val" style="color:#f59e0b">+'+Math.round(gainInter).toLocaleString('fr-FR',{useGrouping:false})+' €</div>'
    +'<div class="sic-kpi-sub">'+Math.round(gainInter/Math.max(totalVers,1)*100)+'% de plus sans intérêts</div>'
    +'</div>'
    +'<div class="sic-kpi">'
    +'<div class="sic-kpi-label">Total versé</div>'
    +'<div class="sic-kpi-val" style="color:#3b82f6">'+Math.round(totalVers).toLocaleString('fr-FR',{useGrouping:false})+' €</div>'
    +'<div class="sic-kpi-sub">capital + mensualités × '+years+' ans</div>'
    +'</div>'
    +'</div>'

  // Tableau
  var tbody = document.getElementById('sic-tbody');
  if(tbody){
    tbody.innerHTML = tableau.map(function(r){
      return '<tr>'
        +'<td><b>'+r.annee+'</b></td>'
        +'<td style="color:'+a.main+';font-weight:700">'+Math.round(r.totalAvec).toLocaleString('fr-FR')+' €</td>'
        +'<td style="color:#3b82f6">'+Math.round(r.versements).toLocaleString('fr-FR')+' €</td>'
        +'<td style="color:#f59e0b">+'+Math.round(r.interets).toLocaleString('fr-FR')+' €</td>'
        +'<td style="color:'+(r.rendement>0?'#10b981':'#7a869a')+'">'+r.rendement.toFixed(1)+'%</td>'
        +'</tr>';
    }).join('');
  }
}

function sicDrawChart(dataAvec, dataSans, dataInter, years, a){
  var canvas = document.getElementById('sic-chart');
  if(!canvas) return;
  var dpr = window.devicePixelRatio||1;
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width*dpr; canvas.height = rect.height*dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  var W = rect.width, H = rect.height;
  ctx.clearRect(0,0,W,H);

  var pad = {l:62, r:16, t:16, b:36};
  var cW = W - pad.l - pad.r;
  var cH = H - pad.t - pad.b;

  var maxV = Math.max.apply(null, dataAvec);
  if(maxV === 0) maxV = 1;

  // Grille horizontale
  var gridLines = 5;
  for(var g = 0; g <= gridLines; g++){
    var gy = pad.t + cH * (1 - g/gridLines);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.l, gy); ctx.lineTo(W-pad.r, gy); ctx.stroke();
    // Labels axe Y
    ctx.fillStyle = '#6b7280';
    ctx.font = '10px -apple-system,sans-serif';
    ctx.textAlign = 'right';
    var labelVal = Math.round(maxV * g / gridLines);
    ctx.fillText(labelVal >= 1000 ? Math.round(labelVal/1000)+'k€' : labelVal+'€', pad.l-5, gy+3);
  }

  var n = dataAvec.length;
  function xOf(i){ return pad.l + (i/(n-1))*cW; }
  function yOf(v){ return pad.t + cH*(1 - v/maxV); }

  // Zone remplie intérêts (entre les deux courbes)
  ctx.beginPath();
  for(var i=0; i<n; i++){
    if(i===0) ctx.moveTo(xOf(i), yOf(dataAvec[i]));
    else ctx.lineTo(xOf(i), yOf(dataAvec[i]));
  }
  for(var i=n-1; i>=0; i--){
    ctx.lineTo(xOf(i), yOf(dataSans[i]));
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(245,158,11,0.12)';
  ctx.fill();

  // Zone remplie sous courbe sans intérêts
  ctx.beginPath();
  for(var i=0; i<n; i++){
    if(i===0) ctx.moveTo(xOf(i), yOf(dataSans[i]));
    else ctx.lineTo(xOf(i), yOf(dataSans[i]));
  }
  ctx.lineTo(xOf(n-1), pad.t+cH);
  ctx.lineTo(xOf(0), pad.t+cH);
  ctx.closePath();
  ctx.fillStyle = 'rgba(59,130,246,0.08)';
  ctx.fill();

  // Courbe sans intérêts (bleue)
  ctx.beginPath();
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 2;
  ctx.setLineDash([6,4]);
  for(var i=0; i<n; i++){
    if(i===0) ctx.moveTo(xOf(i), yOf(dataSans[i]));
    else ctx.lineTo(xOf(i), yOf(dataSans[i]));
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // Courbe avec intérêts (couleur accent)
  ctx.beginPath();
  ctx.strokeStyle = a.main;
  ctx.lineWidth = 2.5;
  for(var i=0; i<n; i++){
    if(i===0) ctx.moveTo(xOf(i), yOf(dataAvec[i]));
    else ctx.lineTo(xOf(i), yOf(dataAvec[i]));
  }
  ctx.stroke();

  // Point final
  ctx.beginPath();
  ctx.arc(xOf(n-1), yOf(dataAvec[n-1]), 5, 0, Math.PI*2);
  ctx.fillStyle = a.main;
  ctx.fill();

  // Labels axe X — intervalles propres, sans chevauchement
  ctx.font = '10px -apple-system,sans-serif';
  ctx.textAlign = 'center';

  // Choisir l'intervalle minimal qui donne ≤ 5 subdivisions
  var niceSteps = [1, 2, 5, 10, 20, 25, 50];
  var interval = niceSteps[niceSteps.length - 1];
  for(var k = 0; k < niceSteps.length; k++){
    if(Math.floor(years / niceSteps[k]) <= 5 && Math.floor(years / niceSteps[k]) > 0){
      interval = niceSteps[k]; break;
    }
  }

  // Construire la liste des ticks
  var ticks = [];
  for(var t = 0; t <= years; t += interval) ticks.push(t);
  if(ticks[ticks.length - 1] !== years) ticks.push(years);

  // Supprimer le pénultième s'il est trop proche du dernier (< 13 % de cW)
  if(ticks.length >= 2){
    if(xOf(ticks[ticks.length - 1]) - xOf(ticks[ticks.length - 2]) < cW * 0.13)
      ticks.splice(ticks.length - 2, 1);
  }

  ticks.forEach(function(t){
    var x = xOf(t);
    // Petite marque de tick
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, pad.t + cH); ctx.lineTo(x, pad.t + cH + 4); ctx.stroke();
    // Label
    ctx.fillStyle = t === years ? 'rgba(255,255,255,0.55)' : '#6b7280';
    ctx.fillText(t === 0 ? 'Auj.' : t + ' an' + (t > 1 ? 's' : ''), x, H - 5);
  });

  // Annotation delta
  if(dataAvec[n-1] > dataSans[n-1]*1.05){
    var yA = yOf(dataAvec[n-1]);
    var yS = yOf(dataSans[n-1]);
    var xEnd = xOf(n-1);
    ctx.strokeStyle = '#f59e0b';
    ctx.lineWidth = 1;
    ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.moveTo(xEnd+6, yA);
    ctx.lineTo(xEnd+6, yS);
    ctx.stroke();
    ctx.setLineDash([]);
    var delta = Math.round(dataAvec[n-1] - dataSans[n-1]);
    ctx.fillStyle = '#f59e0b';
    ctx.font = 'bold 11px -apple-system,sans-serif';
    ctx.textAlign = 'left';
    if(xEnd+50 < W) ctx.fillText('+'+delta.toLocaleString('fr-FR')+'€', xEnd+9, (yA+yS)/2+4);
  }
}

var _amode='login';

function rl(action){
  var now=Date.now(), d=_rl[action];
  if(now-d.ts>900000){d.count=0;d.ts=now;}
  d.count++;
  if(d.count>5){
    aerr('Trop de tentatives. Attends quelques minutes.');
    return true;
  }
  return false;
}

function aerr(msg){
  var e=$('aerr'); if(e){e.textContent=msg;e.style.display='block';}
  var o=$('aok'); if(o) o.style.display='none';
}
function aok(msg){
  var o=$('aok'); if(o){o.textContent=msg;o.style.display='block';}
  var e=$('aerr'); if(e) e.style.display='none';
}
function ahide(){
  var e=$('aerr'); if(e) e.style.display='none';
  var o=$('aok'); if(o) o.style.display='none';
}

// Toast global visible partout dans l'app (aerr/aok n'existent que dans #auth)
function showToast(msg, type){
  var existing = document.getElementById('_toast');
  if(existing) existing.parentNode.removeChild(existing);
  var t = document.createElement('div');
  t.id = '_toast';
  var isErr = type === 'err';
  t.style.cssText = [
    'position:fixed',
    'top:calc(env(safe-area-inset-top,0px) + 64px)',
    'left:50%',
    'transform:translateX(-50%)',
    'max-width:300px',
    'width:calc(100% - 40px)',
    'background:' + (isErr ? '#2a1010' : '#0f2a1a'),
    'color:'      + (isErr ? '#ff6b6b' : '#22c55e'),
    'border:1px solid ' + (isErr ? 'rgba(255,107,107,.35)' : 'rgba(34,197,94,.35)'),
    'border-radius:12px',
    'padding:12px 16px',
    'font-size:13px',
    'font-weight:500',
    'line-height:1.4',
    'z-index:99999',
    'box-shadow:0 8px 32px rgba(0,0,0,.6)',
    'pointer-events:none',
    'text-align:center',
    'transition:opacity .3s'
  ].join(';');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){
    t.style.opacity = '0';
    setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 320);
  }, 3000);
}

  // Enter pour valider
  f.addEventListener('keydown',function(e){
    if(e.key!=='Enter') return;
    if(_amode==='login') doLogin();
    else if(_amode==='signup') doSignup();
    else doForgot();
  });
}

function setAMode(m){_amode=m;renderAuth();}
function togglePw(){
  var i=$('a-pw'), b=$('pw-eye'); if(!i) return;
  i.type=i.type==='password'?'text':'password';
  if(b) b.innerHTML=i.type==='password'?IC.eye(18):IC.eyeoff(18);
}

function setBtnLoading(loading,label){
  var b=$('a-sub'); if(!b) return;
  b.disabled=loading; b.textContent=loading?'Chargement…':label;
}

function validateEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(e).toLowerCase());}
function validatePw(p){return typeof p==='string'&&p.length>=8&&/[A-Z]/.test(p)&&/[0-9]/.test(p);}

function doLogin(){
  if(rl('login')) return;
  ahide();
  var email=($('a-email').value||'').trim().toLowerCase();
  var pw=$('a-pw').value||'';
  if(!validateEmail(email)){aerr('Email invalide.');return;}
  if(!pw){aerr('Mot de passe requis.');return;}
  setBtnLoading(true,'Se connecter');
  sbSignIn(email,pw).then(function(data){
    if(data.error||data.error_code||!data.access_token){
      aerr('Email ou mot de passe incorrect.');
      setBtnLoading(false,'Se connecter');
      return;
    }
    setSession(data);
    bootUser();
  }).catch(function(){
    aerr('Erreur réseau. Réessaie.');
    setBtnLoading(false,'Se connecter');
  });
}

function doSignup(){
  if(rl('signup')) return;
  ahide();
  var email=($('a-email').value||'').trim().toLowerCase();
  var pw=$('a-pw').value||'';
  var pw2=($('a-pw2')||{}).value||'';
  if(!validateEmail(email)){aerr('Email invalide.');return;}
  if(!validatePw(pw)){aerr('Mot de passe : 8 caractères min, 1 majuscule, 1 chiffre.');return;}
  if(pw!==pw2){aerr('Les mots de passe ne correspondent pas.');return;}
  setBtnLoading(true,'Créer mon compte');
  // Utilise /api/register (service key) pour éviter les limites SMTP Supabase
  fetch('/api/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email,password:pw})
  }).then(function(r){return r.json();}).then(function(data){
    if(data.error){
      aerr(data.error);
      setBtnLoading(false,'Créer mon compte');
      return;
    }
    if(data.session&&data.session.access_token){
      setSession(data.session); bootUser(); return;
    }
    aerr('Erreur inattendue. Réessaie.');
    setBtnLoading(false,'Créer mon compte');
  }).catch(function(){
    aerr('Erreur réseau. Vérifie ta connexion.');
    setBtnLoading(false,'Créer mon compte');
  });
}

function doForgot(){
  if(rl('forgot')) return;
  ahide();
  var email=($('a-email').value||'').trim().toLowerCase();
  if(!validateEmail(email)){aerr('Email invalide.');return;}
  setBtnLoading(true,'Envoyer le lien');
  sbRecover(email).then(function(){
    aok('Email envoyé ! Vérifie ta boîte mail.');
    setBtnLoading(false,'Envoyer le lien');
  }).catch(function(){
    aerr('Erreur réseau.');
    setBtnLoading(false,'Envoyer le lien');
  });
}

function checkDeleteConfirm(){
  var val = (document.getElementById('m-confirm').value||'').trim();
  var btn = document.getElementById('m-delete-btn');
  if(!btn) return;
  if(val === 'SUPPRIMER'){
    btn.disabled = false;
    btn.style.background = '#ef4444';
    btn.style.cursor = 'pointer';
  } else {
    btn.disabled = true;
    btn.style.background = '#6b7280';
    btn.style.cursor = 'not-allowed';
  }
}

function confirmDeleteAccount(){
  if(!USER||!TOKEN) return;
  var btn = document.getElementById('m-delete-btn');
  if(btn){btn.disabled=true;btn.textContent='Suppression...';}

  // 1. Supprimer les données Trivio dans Supabase
  fetch(_u+'/rest/v1/trivio_data?user_id=eq.'+USER.id, {
    method: 'DELETE',
    headers: {
      'apikey': _k,
      'Authorization': 'Bearer '+TOKEN,
      'Content-Type': 'application/json'
    }
  }).then(function(){
    // 2. Supprimer le compte auth via l'API Supabase
    return fetch(_u+'/auth/v1/user', {
      method: 'DELETE',
      headers: {
        'apikey': _k,
        'Authorization': 'Bearer '+TOKEN,
        'Content-Type': 'application/json'
      }
    });
  }).then(function(){
    // 3. Nettoyer la session locale
    clearSession();
    try{localStorage.removeItem('_td_'+USER.id);}catch(e){}
    USER = null; TOKEN = null; REFRESH = null;
    // 4. Retour à l\'écran de connexion avec message
    closeM();
    document.getElementById('app').classList.remove('show');
    document.getElementById('auth').style.display='flex';
    _amode='login';
    renderAuth();
    setTimeout(function(){
      var err = document.getElementById('aok');
      if(err){
        err.textContent='Compte supprimé avec succès. À bientôt !';
        err.style.display='block';
      }
    }, 100);
  }).catch(function(e){
    console.warn('Erreur suppression:', e);
    if(btn){btn.disabled=false;btn.textContent='Supprimer définitivement';}
    // Fallback : déconnecter même si la suppression échoue
    doLogout();
  });
}

function doLogout(){
  sbSignOut();
  clearSession();
  S={theme:S.theme,accent:S.accent,regle:S.regle,page:'dashboard',stab:'compte',
    y:new Date().getFullYear(),m:new Date().getMonth(),
    revenus:{},txData:{},prelvs:[],objs:[],plDone:{}};
  $('app').classList.remove('show');
  $('auth').style.display='flex';
  _amode='login'; renderAuth();
}

function tutoShow(steps, id){
  TUTO.steps = steps;
  TUTO.step = 0;
  TUTO.active = true;
  TUTO._id = id || null;
  document.getElementById('tuto-overlay').classList.add('active');
  tutoRender();
}

function tutoRender(){
  var step = TUTO.steps[TUTO.step];
  var total = TUTO.steps.length;
  var a = ACC[S.accent]||ACC.emeraude;

  document.getElementById('tuto-num').textContent = 'Étape '+(TUTO.step+1)+' / '+total;
  document.getElementById('tuto-title').innerHTML = step.title;

  var body = step.body || '';
  if(step.highlight){
    body += '<span class="highlight" style="display:flex;align-items:flex-start;gap:6px">'+IC.bulb(13)+' '+step.highlight+'</span>';
  }
  if(step.extra){
    body += step.extra;
  }
  document.getElementById('tuto-body').innerHTML = body;

  // Dots
  var dots = '';
  for(var i=0;i<total;i++){
    dots += '<div class="tuto-dot'+(i===TUTO.step?' active':'')+'"></div>';
  }
  document.getElementById('tuto-dots').innerHTML = dots;

  // Bouton
  var btn = document.getElementById('tuto-next-btn');
  btn.textContent = step.isLast ? 'Terminer ✓' : 'Suivant →';
  btn.style.background = a.main;

  // Positionner la box au centre
  var box = document.getElementById('tuto-box');
  box.classList.add('show');
  box.style.top = '50%';
  box.style.left = '50%';
  box.style.transform = 'translate(-50%,-50%)';
  document.getElementById('tuto-arrow').style.display = 'none';
}

function tutoNext(){
  if(TUTO.step < TUTO.steps.length - 1){
    TUTO.step++;
    tutoRender();
  } else {
    tutoEnd();
  }
}

function tutoSkip(){
  tutoEnd();
}

function tutoEnd(){
  TUTO.active = false;
  document.getElementById('tuto-overlay').classList.remove('active');
  document.getElementById('tuto-box').classList.remove('show');
  if(TUTO._id){
    if(!S.plDone) S.plDone={};
    S.plDone['tuto_'+TUTO._id] = true;
    if(TUTO._id === 'epargnes'){
      S.tutoEpargneDone = true;
    }
  }
  dbSave();
}

// Lancer le didacticiel épargnes
function startTutoEpargnes(){
  tutoShow(buildTutoSteps(), 'epargnes');
}

function obErr(msg){
  var ex=document.getElementById('ob-err');
  if(ex){ex.textContent=msg;return;}
  var d=document.createElement('div');
  d.id='ob-err';
  d.style.cssText='background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#ef4444;border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:12px;text-align:center';
  d.textContent=msg;
  var nav=document.querySelector('.ob-nav');
  if(nav)nav.parentNode.insertBefore(d,nav);
  setTimeout(function(){if(d.parentNode)d.parentNode.removeChild(d);},3000);
}

function obChoice(field, value, el){
  OB.data[field]=value;
  var parent=el.parentNode;
  parent.querySelectorAll('.ob-choice').forEach(function(c){c.classList.remove('sel');});
  el.classList.add('sel');
}
function obSitClick(el){obChoice('situation', el.getAttribute('data-val'), el);}
function obObjClick(el){obChoice('objectifPrincipal', el.getAttribute('data-val'), el);}

function obRegleSync(){
  var c=parseInt(document.getElementById('ob-rc').value)||0;
  var p=parseInt(document.getElementById('ob-rp').value)||0;
  var e=parseInt(document.getElementById('ob-re').value)||0;
  var s=c+p+e;
  var el=document.getElementById('ob-rsum');
  if(el){
    el.textContent='Total : '+s+'% '+(s===100?'✓':'⚠');
    el.style.color=s===100?'#10b981':'#ef4444';
  }
}

function renderOBStep(){
  var step=OB_STEPS[OB.step];
  var a=ACC[S.accent]||ACC.emeraude;

  // Progress dots
  var dots=OB_STEPS.map(function(_,i){
    var cls='ob-dot'+(i===OB.step?' active':(i<OB.step?' done':''));
    return '<div class="'+cls+'"></div>';
  }).join('');
  document.getElementById('ob-prog').innerHTML=dots;

  // Content
  var title=typeof step.title==='function'?step.title():step.title;
  var sub=typeof step.sub==='function'?step.sub():step.sub;
  var bodyHTML=step.render();
  var wrapClass=step.wrapClass||'';

  var imgKey=['welcome','situation','revenus','objectif','matelas','regle','finish'];
  var imgSrc=OB_SVG[imgKey[OB.step]]||OB_SVG.welcome;
  var html='<div class="ob-step show">'
    +'<div class="ob-img"><img src="'+imgSrc+'" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"/></div>'
    +'<div class="ob-title">'+title+'</div>'
    +'<div class="ob-sub">'+sub+'</div>'
    +(wrapClass?'<div class="'+wrapClass+'">'+bodyHTML+'</div>':bodyHTML)
    +'<div class="ob-nav">'
    +(OB.step>0?'<button class="ob-back" onclick="obBack()">← Retour</button>':'')
    +'<button class="ob-next" onclick="obNext()" style="background:'+a.main+'">'
    +(step.isLast?'Commencer Trivio ':'Continuer →')
    +'</button></div>'
    +(OB.step===0?'<button class="ob-skip" onclick="obSkip()">Passer l\'onboarding</button>':'')
    +'</div>';

  document.getElementById('ob-steps').innerHTML=html;
}

function obNext(){
  var step=OB_STEPS[OB.step];
  if(step.next&&!step.next()) return;
  if(step.isLast){
    obFinish(); return;
  }
  OB.step++;
  renderOBStep();
}

function obBack(){
  if(OB.step>0){OB.step--;renderOBStep();}
}

function obSkip(){
  obFinish();
}

function obFinish(){
  S.regle=OB.data.regle;
  S.onboardingDone=true;

  // Ajouter le revenu du mois en cours
  if(OB.data.salaire>0){
    var mk2=S.y+'-'+S.m;
    S.revenus[mk2]=[{id:Date.now(),source:'Salaire',montant:OB.data.salaire}];
  }

  // ── Matelas de sécurité automatique selon la situation ──
  // Règle : salarié = 3-4 mois, entrepreneur = 6-8 mois, autres = 4-6 mois
  var sal=OB.data.salaire||0;
  var sit=OB.data.situation||'';
  var moisMin, moisMax, emoji, conseil;
  if(sit==='salarie'){
    moisMin=3; moisMax=4; emoji='🛡️';
    conseil='En CDI, 3 à 4 mois de salaire net te protègent en cas de coup dur.';
  } else if(sit==='independant'){
    moisMin=6; moisMax=8; emoji='🏗️';
    conseil='En tant qu\'indépendant, vise 6 à 8 mois de revenus — tes rentrées sont irrégulières.';
  } else if(sit==='etudiant'){
    moisMin=2; moisMax=3; emoji='🎓';
    conseil='Commence avec 2 à 3 mois de dépenses pour faire face aux imprévus.';
  } else {
    moisMin=4; moisMax=6; emoji='🛡️';
    conseil='Vise 4 à 6 mois de dépenses mensuelles pour une bonne sécurité financière.';
  }
  var cibleMatelas=sal>0?sal*moisMin:3000;
  var cibleIdeal=sal>0?sal*moisMax:6000;

  S.objs=[];

  // Objectif 1 : Matelas de sécurité (PRIORITÉ 1)
  S.objs.push({
    id:Date.now(),
    nom:'Matelas de sécurité',
    cible:cibleIdeal,
    actuel:OB.data.epargneActuelle||0,
    echeance:'',
    emoji:emoji,
    livret:'Livret A',
    taux:1.5,
    actif:true,
    note:conseil,
    priorite:1
  });

  // Objectif 2 : Selon l'objectif principal choisi
  if(OB.data.objectifPrincipal&&OB.data.objectifPrincipal!=='securite'){
    var obj2={id:Date.now()+1,actuel:0,echeance:'',livret:'',taux:0,actif:true,priorite:2};
    if(OB.data.objectifPrincipal==='projet'){
      obj2.nom='Mon projet'; obj2.emoji='🏠'; obj2.cible=sal>0?sal*12:10000;
    } else if(OB.data.objectifPrincipal==='retraite'){
      obj2.nom='Retraite'; obj2.emoji='🌴'; obj2.cible=sal>0?sal*24:20000; obj2.livret='Assurance-vie'; obj2.taux=2.6;
    } else if(OB.data.objectifPrincipal==='voyage'){
      obj2.nom='Voyage'; obj2.emoji='✈️'; obj2.cible=sal>0?sal*3:3000;
    } else if(OB.data.objectifPrincipal==='liberte'){
      obj2.nom='Liberté financière'; obj2.emoji='💎'; obj2.cible=sal>0?sal*36:30000; obj2.livret='Assurance-vie'; obj2.taux=2.6;
    } else if(OB.data.objectifPrincipal==='quotidien'){
      obj2.nom='Épargne mensuelle'; obj2.emoji='📊'; obj2.cible=sal>0?sal*6:5000;
    }
    if(obj2.nom) S.objs.push(obj2);
  }

  dbSave();
  document.getElementById('ob').classList.remove('show');
  applyTheme();
  renderNav();
  setHdr();
  render();
}

function showOnboarding(){
  OB.step=0;
  OB.data={prenom:'',situation:'',salaire:'',objectifPrincipal:'',
    regle:{charges:50,plaisirs:30,epargne:20},epargneActuelle:'',livret:''};
  document.getElementById('ob').classList.add('show');
  renderOBStep();
}

// ══════════════════════════════════════════════════════
// BACKUP — Export / Import / Restore
// ══════════════════════════════════════════════════════
function exportData(){
  var data = {
    _version:1, _exportDate:new Date().toISOString(),
    _email:(USER&&USER.email)||'',
    theme:S.theme, accent:S.accent, regle:S.regle,
    revenus:S.revenus, txData:S.txData,
    prelvs:S.prelvs, objs:S.objs, onboardingDone:S.onboardingDone
  };
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'trivio-backup-' + new Date().toISOString().split('T')[0] + '.json';
  document.body.appendChild(a); a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
  aok('Sauvegarde exportée !');
}

function importData(){
  var input = document.createElement('input');
  input.type = 'file'; input.accept = '.json,application/json,image/*,*/*';
  input.onchange = function(e){
    var file = e.target.files[0]; if(!file) return;
    if(file.type.startsWith('image/')){
      showToast('Ce fichier est une photo — sélectionne le fichier .json de ta sauvegarde Trivio.', 'err'); return;
    }
    var reader = new FileReader();
    reader.onload = function(ev){
      try {
        var data = JSON.parse(ev.target.result);
        if(!data.txData && !data.revenus && !data.prelvs){
          showToast("Fichier invalide — ce n\'est pas une sauvegarde Trivio.", 'err'); return;
        }
        applyData(data); dbSave();
        applyTheme(); renderNav(); renderBottomNav(); render();
        if(S.page==='params') pageParams();
        showToast('Données importées avec succès !', 'ok');
      } catch(err){ showToast('Fichier JSON invalide — vérifie que c\'est bien une sauvegarde Trivio.', 'err'); }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input); input.click();
  setTimeout(function(){ if(input.parentNode) document.body.removeChild(input); }, 2000);
}

function restoreBackup(idx){
  var bk = (S._backups||[])[idx]; if(!bk) return;
  var d = new Date(bk.ts).toLocaleString('fr-FR');
  if(!confirm('Restaurer la sauvegarde du ' + d + ' ?\nLes modifications récentes seront perdues.')) return;
  applyData(bk.d); dbSave();
  applyTheme(); renderNav(); renderBottomNav(); render();
  if(S.page==='params') pageParams();
  aok('Sauvegarde restaurée !');
}

function bootUser(){
  $('auth').style.display='none';
  $('app').classList.add('show');
  lockNav();
  updateBadge();

  // Clé locale pour savoir si cet utilisateur a déjà été onboardé
  var _obKey = '_trivio_ob_' + (USER && USER.id);

  dbLoad().then(function(data){
    var hasLocalData = false;
    if(data){
      applyData(data);
      // Marquer l'utilisateur comme connu dès qu'on a ses données Supabase
      try{ localStorage.setItem(_obKey, '1'); }catch(e){}
    } else {
      // Pas de données Supabase → essai localStorage backup
      try{
        var local = localStorage.getItem('_td_'+USER.id);
        if(local){ applyData(JSON.parse(local)); hasLocalData = true; }
      }catch(e){}
    }
    applyTheme();
    autoPrelevements();
    autoInterets();
    renderNav();
    renderBottomNav();
    setHdr();
    render();
    lockNav();
    setTimeout(lockNav, 100);

    // Onboarding SEULEMENT si c'est un vrai nouveau compte :
    // aucune donnée Supabase, aucun backup local, et jamais onboardé
    var alreadyKnown = false;
    try{ alreadyKnown = !!localStorage.getItem(_obKey); }catch(e){}
    var isRealNewUser = !data && !hasLocalData && !alreadyKnown;
    if(isRealNewUser && !S.onboardingDone){
      setTimeout(showOnboarding, 300);
    }
    pushSetup();
  }).catch(function(){
    // Erreur réseau : afficher l'app avec les données locales disponibles
    try{
      var local = localStorage.getItem('_td_'+USER.id);
      if(local){ applyData(JSON.parse(local)); }
    }catch(e){}
    applyTheme(); renderNav(); renderBottomNav(); setHdr(); render();
    lockNav();
    setTimeout(lockNav, 100);
    // Ne JAMAIS déclencher l'onboarding sur une erreur réseau
    pushSetup();
  });
}

applyTheme();
renderAuth();

// ── Gérer le lien de confirmation email Supabase ──────
(function(){
  var hash = window.location.hash;
  var search = window.location.search;
  var params = new URLSearchParams(hash.replace('#','?') || search);
  var type = params.get('type');
  var accessToken = params.get('access_token');
  var tokenHash = params.get('token_hash');
  var error = params.get('error_description');

  // Nettoyage de l'URL sans rechargement
  if(hash || (search && (type || tokenHash))){
    history.replaceState(null,'',window.location.pathname);
  }

  if(error){
    setTimeout(function(){
      aerr(decodeURIComponent(error.replace(/\+/g,' ')));
    },100);
    return;
  }

  if(type === 'signup' || type === 'email_change' || type === 'recovery'){
    if(accessToken){
      // Connexion directe avec le token reçu
      TOKEN = accessToken;
      var rt = params.get('refresh_token');
      if(rt) REFRESH = rt;
      // Récupérer les infos utilisateur
      fetch(_u+'/auth/v1/user',{
        headers:{'apikey':_k,'Authorization':'Bearer '+accessToken}
      }).then(function(r){return r.json();})
      .then(function(u){
        if(u && u.id){
          USER = u;
          setSession({access_token:accessToken,refresh_token:rt||'',user:u});
          // Afficher message de succès puis connecter
          $('auth').style.display='flex';
          renderAuth();
          setTimeout(function(){
            aok('Email confirmé ! Connexion en cours...');
            setTimeout(function(){ bootUser(); }, 1500);
          },200);
        }
      }).catch(function(){});
      return;
    }
    if(tokenHash){
      // Vérifier le token hash (nouveau format Supabase)
      fetch(_u+'/auth/v1/verify',{
        method:'POST',
        headers:{'apikey':_k,'Content-Type':'application/json'},
        body:JSON.stringify({token_hash:tokenHash,type:type})
      }).then(function(r){return r.json();})
      .then(function(data){
        if(data && data.access_token){
          setSession(data);
          $('auth').style.display='flex';
          renderAuth();
          setTimeout(function(){
            aok('Email confirmé ! Connexion en cours...');
            setTimeout(function(){ bootUser(); }, 1500);
          },200);
        } else {
          setTimeout(function(){
            aerr('Lien expiré ou invalide. Inscris-toi à nouveau.');
          },100);
        }
      }).catch(function(){
        setTimeout(function(){
          aerr('Erreur de confirmation. Réessaie.');
        },100);
      });
      return;
    }
  }
})();

// ═══════════════════════════════════════════════════════
// PUSH NOTIFICATIONS
// ═══════════════════════════════════════════════════════
var _swReg = null;
var _pushSub = null;

function pushSupported(){
  return 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
}

function pushStatus(){
  if(!pushSupported()) return 'unsupported';
  if(Notification.permission === 'denied') return 'denied';
  if(_pushSub) return 'subscribed';
  return 'default';
}

function urlB64ToUint8(b64){
  var padding='='.repeat((4-b64.length%4)%4);
  var base64=(b64+padding).replace(/-/g,'+').replace(/_/g,'/');
  var raw=atob(base64);
  var arr=new Uint8Array(raw.length);
  for(var i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return arr;
}

function pushRender(){
  var el=$('push-toggle-area');
  if(!el) return;
  var a=acc();
  var st=pushStatus();
  var html='';
  if(st==='unsupported'){
    html='<div style="font-size:12px;color:#7a869a;padding:4px 0">'
      +'Pour activer les notifications, ajoute Trivio à ton écran d\'accueil (iOS 16.4+ requis).</div>';
  } else if(st==='denied'){
    html='<div style="font-size:12px;color:#ffb4ab;padding:4px 0">'
      +'Notifications bloquées dans les réglages de ton navigateur.</div>';
  } else {
    var on=st==='subscribed';
    html='<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0">'
      +'<div>'
        +'<div style="font-size:13px;font-weight:600;color:#e8eaf0">'+(on?'Activées ✓':'Désactivées')+'</div>'
        +'<div style="font-size:12px;color:#7a869a;margin-top:2px">'+(on?'Tu recevras les rappels Trivio':'Appuie pour activer')+'</div>'
      +'</div>'
      +'<button onclick="pushToggle()" style="width:52px;height:30px;border-radius:20px;border:none;cursor:pointer;background:'+(on?a.main:'#2a2f3e')+';position:relative;transition:background .2s;flex-shrink:0">'
        +'<div style="position:absolute;top:4px;'+(on?'right:4px':'left:4px')+';width:22px;height:22px;border-radius:50%;background:#fff;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)"></div>'
      +'</button></div>';
  }
  el.innerHTML=html;
}

function pushSettingsHTML(){
  return '<div class="card"><div class="ctit" style="display:flex;align-items:center;gap:6px">'+IC.bell(15)+' Notifications push</div>'
    +'<div id="push-toggle-area" style="min-height:36px"></div>'
    +'<div style="margin-top:16px;border-top:1px solid #252d3e;padding-top:16px">'
    +'<div style="font-size:12px;color:#7a869a;line-height:1.7">'
    +'<span style="display:flex;align-items:center;gap:5px;margin-bottom:4px">'+IC.chart(12)+' <span><b>1er du mois</b> — rappel pour saisir tes revenus</span></span>'
    +'<span style="display:flex;align-items:center;gap:5px;margin-bottom:4px">'+IC.receipt(12)+' <span><b>Chaque jour à midi</b> — rappel dépenses si rien saisi</span></span>'
    +'<span style="display:flex;align-items:center;gap:5px;margin-bottom:4px">'+IC.moon(12)+' <span><b>Chaque soir à 20h</b> — rappel dépenses si rien saisi</span></span>'
    +'<span style="display:flex;align-items:center;gap:5px">'+IC.coins(12)+' <span><b>Chaque matin à 7h</b> — intérêts générés cette nuit</span></span>'
    +'</div></div></div>';
}

function pushToggle(){
  if(pushStatus()==='subscribed') pushUnsubscribe().then(pushRender);
  else pushSubscribe().then(pushRender);
}

function pushSubscribe(){
  if(!pushSupported()||!USER) return Promise.resolve();
  return fetch('/api/vapid')
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(!data.publicKey) throw new Error('No VAPID key');
      return navigator.serviceWorker.register('/sw.js')
        .then(function(reg){
          _swReg=reg;
          return navigator.serviceWorker.ready;
        })
        .then(function(){
          return Notification.requestPermission();
        })
        .then(function(perm){
          if(perm!=='granted') return;
          return _swReg.pushManager.subscribe({
            userVisibleOnly:true,
            applicationServerKey:urlB64ToUint8(data.publicKey)
          });
        })
        .then(function(sub){
          if(!sub) return;
          _pushSub=sub;
          try{localStorage.setItem('_push_asked','1');}catch(e){}
          pushBannerHide();
          return fetch('/api/subscribe',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({subscription:sub.toJSON(),token:TOKEN})
          });
        });
    })
    .catch(function(e){ console.warn('Push subscribe error',e); });
}

function pushUnsubscribe(){
  if(!_pushSub) return Promise.resolve();
  return _pushSub.unsubscribe()
    .then(function(){
      _pushSub=null;
      return fetch('/api/subscribe',{
        method:'DELETE',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({token:TOKEN})
      });
    })
    .catch(function(e){ console.warn('Push unsubscribe error',e); });
}

function pushSetup(){
  if(!pushSupported()) return;
  navigator.serviceWorker.register('/sw.js')
    .then(function(reg){
      _swReg=reg;
      return navigator.serviceWorker.ready;
    })
    .then(function(){
      return _swReg.pushManager.getSubscription();
    })
    .then(function(sub){
      _pushSub=sub;
      var asked=false;
      try{asked=!!localStorage.getItem('_push_asked');}catch(e){}
      if(!_pushSub && !asked && Notification.permission==='default'){
        setTimeout(pushBannerShow, 2500);
      }
    })
    .catch(function(e){ console.warn('Push setup error',e); });
}

function pushBannerShow(){
  var el=$('push-banner');
  if(!el) return;
  var a=acc();
  el.innerHTML='<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:#1a1e27;border:1px solid #252d3e;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.5)">'
    +'<div style="display:flex;align-items:center;justify-content:center;flex-shrink:0">'+IC.bell(22)+' </div>'
    +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:13px;font-weight:600;color:#e8eaf0">Activer les notifications ?</div>'
      +'<div style="font-size:11px;color:#7a869a;margin-top:1px">Rappels dépenses, intérêts du jour…</div>'
    +'</div>'
    +'<button onclick="pushSubscribe().then(pushRender)" style="padding:7px 13px;border-radius:8px;background:'+a.main+';color:#09090b;font-size:12px;font-weight:700;border:none;cursor:pointer;flex-shrink:0;white-space:nowrap">Activer</button>'
    +'<button onclick="pushBannerHide()" style="width:26px;height:26px;border-radius:50%;background:#20293a;border:1px solid #252d3e;color:#7a869a;font-size:13px;cursor:pointer;flex-shrink:0">✕</button>'
    +'</div>';
  el.style.display='block';
}

function pushBannerHide(){
  var el=$('push-banner');
  if(el){el.innerHTML='';el.style.display='none';}
  try{localStorage.setItem('_push_asked','1');}catch(e){}
}

// ── FIN PUSH NOTIFICATIONS ────────────────────────────

// Tenter de restaurer la session
(function(){
  var saved;
  try{saved=sessionStorage.getItem('_ts');}catch(e){saved=null;}
  if(!saved){return;} // Pas de session → rester sur auth
  var sess;
  try{sess=JSON.parse(saved);}catch(e){return;}
  if(!sess||!sess.t||!sess.r||!sess.u) return;
  // Session trouvée → tenter refresh
  TOKEN=sess.t; REFRESH=sess.r; USER=sess.u;
  var timer=setTimeout(function(){
    // Timeout 5s → afficher auth
    TOKEN=null;REFRESH=null;USER=null;
    try{sessionStorage.removeItem('_ts');}catch(e){}
  },5000);
  sbRefresh(sess.r).then(function(data){
    clearTimeout(timer);
    if(data&&data.access_token){
      setSession(data);
      bootUser();
    } else {
      TOKEN=null;REFRESH=null;USER=null;
      try{sessionStorage.removeItem('_ts');}catch(e){}
    }
  }).catch(function(){
    clearTimeout(timer);
    // Offline → utiliser session existante
    bootUser();
  });
})();
