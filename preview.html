<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trivio — Preview</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #050507;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    gap: 24px;
    padding: 32px 16px;
  }

  /* ── barre du haut ── */
  .top-bar {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .top-bar h1 {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,.35);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .reload-btn {
    padding: 6px 14px;
    border-radius: 999px;
    background: rgba(34,197,94,.12);
    border: 1px solid rgba(34,197,94,.25);
    color: #22c55e;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    letter-spacing: .02em;
  }
  .reload-btn:hover { background: rgba(34,197,94,.2); }

  .size-label {
    font-size: 11px;
    color: rgba(255,255,255,.2);
    font-weight: 500;
  }

  /* ── téléphone ── */
  .phone-wrap {
    position: relative;
    /* iPhone 15 Pro — 393×852 logical, ratio .461 */
    width: 340px;
    height: 737px;
    flex-shrink: 0;
  }

  /* cadre externe */
  .phone-frame {
    position: absolute;
    inset: 0;
    border-radius: 52px;
    background: linear-gradient(160deg, #3a3a3c 0%, #1c1c1e 40%, #2c2c2e 100%);
    box-shadow:
      0 0 0 1px rgba(255,255,255,.08),
      0 0 0 10px #1a1a1c,
      0 0 0 11px rgba(255,255,255,.06),
      0 40px 120px rgba(0,0,0,.85),
      0 0 60px rgba(34,197,94,.06);
  }

  /* écran */
  .phone-screen {
    position: absolute;
    inset: 10px;
    border-radius: 44px;
    overflow: hidden;
    background: #09090B;
  }

  /* dynamic island */
  .dynamic-island {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 96px;
    height: 30px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
    box-shadow: 0 0 0 1px rgba(255,255,255,.04);
  }

  /* boutons latéraux */
  .btn-left-top {
    position: absolute;
    left: -3px;
    top: 110px;
    width: 3px;
    height: 32px;
    background: #2c2c2e;
    border-radius: 2px 0 0 2px;
  }
  .btn-left-mid1 {
    position: absolute;
    left: -3px;
    top: 162px;
    width: 3px;
    height: 58px;
    background: #2c2c2e;
    border-radius: 2px 0 0 2px;
  }
  .btn-left-mid2 {
    position: absolute;
    left: -3px;
    top: 232px;
    width: 3px;
    height: 58px;
    background: #2c2c2e;
    border-radius: 2px 0 0 2px;
  }
  .btn-right {
    position: absolute;
    right: -3px;
    top: 178px;
    width: 3px;
    height: 80px;
    background: #2c2c2e;
    border-radius: 0 2px 2px 0;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* reflet */
  .phone-screen::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 44px;
    background: linear-gradient(135deg, rgba(255,255,255,.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 5;
  }

  /* ── infos bas ── */
  .bottom-info {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .info-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.07);
    font-size: 11px;
    color: rgba(255,255,255,.3);
    font-weight: 500;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px #22c55e;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }
</style>
</head>
<body>

  <div class="top-bar">
    <h1>Trivio Preview</h1>
    <button class="reload-btn" onclick="document.getElementById('frame').src = document.getElementById('frame').src">↺ Reload</button>
    <span class="size-label">390 × 844</span>
  </div>

  <div class="phone-wrap">
    <div class="phone-frame">
      <!-- boutons -->
      <div class="btn-left-top"></div>
      <div class="btn-left-mid1"></div>
      <div class="btn-left-mid2"></div>
      <div class="btn-right"></div>

      <div class="phone-screen">
        <div class="dynamic-island"></div>
        <iframe id="frame" src="index.html" title="Trivio App"></iframe>
      </div>
    </div>
  </div>

  <div class="bottom-info">
    <div class="info-chip"><div class="dot"></div> Live</div>
    <div class="info-chip">iPhone 15 Pro</div>
    <div class="info-chip">Dark mode</div>
  </div>

</body>
</html>
